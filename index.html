<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F13LD.mesh — Scaffold Exporter</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
    "fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.2/+esm"
  }
}
</script>
<style>
:root{--bg:#06080f;--panel:#111118;--border:#2a2a3a;--text:#e0e0ff;--muted:#555;--dim:#888;--cyan:#22d3ee;--purple:#7c6ff7;--green:#18f370;--amber:#f59e0b;--fail:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif}
#container{display:flex;flex-direction:column;height:100vh}
#hdr{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;flex-shrink:0}
#hdr h1{font-size:13px;font-weight:500;color:#7c8aaa;letter-spacing:.08em;text-transform:uppercase;flex:1}
.ver{font-size:10px;color:#3a3a5a;margin-left:6px}
.mpill{display:flex;align-items:center;gap:5px;background:var(--panel);border:.5px solid var(--border);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.mdot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0}
.mdot.loading{background:var(--amber);animation:pulse 1.2s infinite}
.mdot.ready{background:var(--cyan)}
.mdot.error{background:var(--fail)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#errorBox{display:none;background:rgba(248,113,113,.07);border:.5px solid var(--fail);border-radius:7px;padding:9px 12px;font-size:12px;color:#ffb4b4;margin:0 16px 8px;line-height:1.5}
#dropzone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 16px 16px;border:.5px dashed var(--border);border-radius:12px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
#dropzone:hover,#dropzone.dragover{border-color:var(--cyan);background:rgba(34,211,238,.025)}
#dropzone.dragover{border-style:solid}
.dz-icon{font-size:28px;margin-bottom:14px;opacity:.2;line-height:1}
.dz-main{font-size:13px;color:var(--dim);margin-bottom:5px}
.dz-sub{font-size:11px;color:var(--muted);letter-spacing:.04em}
.dz-pick{font-size:11px;color:var(--cyan);margin-top:12px;text-decoration:underline;text-underline-offset:3px;cursor:pointer}
#fileInput{display:none}
#recipeView{display:none;flex-direction:row;flex:1;margin:0 16px 16px;min-height:0;gap:12px;align-items:stretch}
#previewArea{flex:1;min-height:0;position:relative;overflow:hidden;background:var(--panel);border:.5px solid var(--border);border-radius:12px}
#threeCanvas{position:absolute;inset:0;display:block;width:100%;height:100%}
#computeOverlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;background:rgba(6,8,15,.82);z-index:4}
#computeOverlay.hidden{display:none}
.co-main{font-size:15px;color:var(--amber);font-weight:500;letter-spacing:.04em}
.co-sub{font-size:12px;color:var(--amber);opacity:.75;margin-top:3px}
#typeBadge{position:absolute;top:10px;left:10px;z-index:3;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
#typeBadge.noise{background:rgba(34,211,238,.1);color:var(--cyan);border:.5px solid var(--cyan)}
#typeBadge.tpms{background:rgba(124,111,247,.1);color:var(--purple);border:.5px solid var(--purple)}
#typeBadge.grain{background:rgba(24,243,112,.1);color:var(--green);border:.5px solid var(--green)}
#reloadBtn{position:absolute;top:10px;right:10px;z-index:3;font-size:10px;color:var(--muted);background:rgba(6,8,15,.85);border:.5px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer;font-family:inherit}
#reloadBtn:hover{color:var(--text);border-color:var(--dim)}
#resStrip{position:absolute;bottom:10px;right:10px;display:flex;gap:4px;z-index:3}
.res-btn{font-size:10px;padding:3px 8px;border:.5px solid var(--border);border-radius:5px;background:rgba(6,8,15,.85);color:var(--muted);cursor:pointer;font-family:inherit;transition:color .1s,border-color .1s}
.res-btn.active{color:var(--cyan);border-color:var(--cyan)}
.res-btn:disabled{opacity:.4;cursor:default}
#triPill{display:none;position:absolute;bottom:10px;left:10px;z-index:3;font-size:10px;color:var(--dim);background:rgba(6,8,15,.85);border:.5px solid var(--border);border-radius:5px;padding:3px 8px}
#panel{background:var(--panel);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;overflow-y:auto;width:240px;flex-shrink:0;min-height:0}
.sec-lbl{font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
hr.div{border:none;border-top:.5px solid var(--border);margin:10px 0}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-bottom:10px}
.mc{background:#0e0e1a;border:.5px solid var(--border);border-radius:7px;padding:7px 9px}
.mc-lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
.mc-val{font-size:13px;color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;word-break:break-all}
.mc-unit{font-size:10px;color:var(--muted);margin-left:2px}
.homo-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.hchip{background:#0e0e1a;border:.5px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.hchip b{color:var(--text);font-weight:500}
.hchip small{font-size:10px;color:var(--muted)}
.exp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.exp-label{font-size:12px;color:var(--dim);min-width:80px}
.exp-num{font-size:12px;padding:2px 6px;background:#1a1a2e;border:.5px solid var(--border);border-radius:5px;color:var(--text);width:60px;text-align:center;font-family:inherit}
.exp-unit{font-size:11px;color:var(--muted)}
.qual-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:100%}
.qual-btn{font-size:11px;padding:0;min-height:36px;border:.5px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;width:100%;text-align:center;transition:color .1s,border-color .1s,background .1s;line-height:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.qual-btn .ql{display:none}
.qual-btn.active{color:var(--purple);border-color:var(--purple);background:rgba(124,111,247,.1)}
.qual-btn.active .ql{color:var(--purple)}
#expBtn{width:100%;padding:7px 14px;border:.5px solid var(--cyan);border-radius:20px;background:rgba(34,211,238,.08);color:var(--cyan);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s;position:relative;overflow:hidden}
#expBtn:hover:not(:disabled){background:rgba(34,211,238,.18)}
#expBtn:disabled{opacity:.4;cursor:not-allowed;background:transparent;border-color:var(--border);color:var(--muted)}
#expBtn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(34,211,238,.18) 50%,transparent 100%);transform:translateX(-100%);pointer-events:none}
#expBtn.sweeping::after{animation:btnSweep 1s ease-in-out infinite}
@keyframes btnSweep{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.exp-report{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.exp-chip{background:#0e0e1a;border:.5px solid var(--border);border-radius:5px;padding:3px 8px;font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.exp-chip b{color:var(--text);font-weight:500}
.exp-err{font-size:11px;color:#ffb4b4;margin-top:6px;line-height:1.5}

/* ── Shape import strip ─────────────────────────────────────────────────── */
#shapeStrip{margin:0 16px;flex-shrink:0}
#shapeDZ{display:flex;align-items:center;gap:10px;padding:8px 12px;border:.5px dashed var(--border);border-radius:0 0 0 0;background:rgba(24,243,112,.025);cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
#shapeDZ:hover,#shapeDZ.dragover{border-color:var(--green);background:rgba(24,243,112,.045)}
#shapeDZ.dragover{border-style:solid}
.sdz-icon{font-size:16px;opacity:.55;flex-shrink:0;line-height:1}
.sdz-label{font-size:16px;color:var(--dim);white-space:nowrap;font-weight:500}
.sdz-sub{font-size:14px;color:var(--muted);white-space:nowrap}
.sdz-pills{display:flex;gap:3px;flex-shrink:0}
.sdz-pill{font-size:8px;letter-spacing:.08em;padding:1px 5px;border-radius:3px;border:.5px solid}
.sdz-pill.mesh{color:#5a8ae0;border-color:#2a3a5a}
.sdz-pill.cad{color:#a05ae0;border-color:#3a2a5a}
.sdz-sep{flex:1}
.sdz-hint{font-size:10px;color:var(--muted);white-space:nowrap}
#shapeInput{display:none}
/* loaded card */
#shapeCard{display:none;padding:7px 12px;border:.5px solid var(--border);border-top:none;background:var(--panel);border-radius:0}
.sc-row{display:flex;align-items:center;gap:8px}
.sc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sc-dot.ok{background:var(--green)}
.sc-dot.err{background:var(--fail)}
.sc-dot.warn{background:var(--amber)}
.sc-name{font-size:15px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:500}
.sc-chips{display:flex;gap:4px;flex-wrap:wrap}
.sc-chip{font-size:12px;color:var(--dim);background:#0e0e1a;border:.5px solid var(--border);border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums}
.sc-chip b{color:var(--text);font-weight:500}
.sc-status{font-size:13px;margin-top:4px}
.sc-status.ok{color:var(--green)}
.sc-status.err{color:#ffb4b4}
.sc-clear{font-size:10px;color:var(--muted);background:transparent;border:.5px solid var(--border);border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit;transition:color .1s,border-color .1s;flex-shrink:0}
.sc-clear:hover{color:#ffb4b4;border-color:var(--fail)}

#cancelMeshBtn:hover{background:rgba(248,113,113,.2)}
#staleBanner{position:absolute;bottom:44px;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 14px;background:rgba(245,158,11,.13);border-top:.5px solid var(--amber);border-bottom:.5px solid var(--amber);font-size:11px;color:var(--amber);pointer-events:auto}
#staleRefreshBtn{font-size:10px;font-family:inherit;padding:3px 10px;border:.5px solid var(--amber);border-radius:4px;background:rgba(245,158,11,.15);color:var(--amber);cursor:pointer;transition:background .15s}
#staleRefreshBtn:hover{background:rgba(245,158,11,.3)}
@keyframes stalePulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.5)}60%{box-shadow:0 0 0 5px rgba(245,158,11,0)}}
#staleRefreshBtn.pulsing{animation:stalePulse 1.4s ease-out infinite}
.preview-stale #threeCanvas{opacity:.35;transition:opacity .25s}
#threeCanvas{transition:opacity .25s}

#cellOverlay{position:absolute;bottom:44px;left:10px;z-index:6;display:none;align-items:center;gap:8px;background:rgba(6,8,15,.88);border:.5px solid var(--amber);border-radius:6px;padding:6px 12px}
#cellOverlay label{font-size:10px;color:var(--amber);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
#cellSizeDisplay{font-size:18px;font-weight:600;color:var(--amber);font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
#cellSizeUnit{font-size:10px;color:var(--amber);opacity:.7}
#cellOverlay input[type=number]{width:60px;font-size:14px;background:transparent;border:none;border-bottom:.5px solid var(--amber);color:var(--amber);font-family:inherit;font-variant-numeric:tabular-nums;text-align:right;outline:none;padding:0 2px}
#cellOverlay input[type=number]::-webkit-inner-spin-button{opacity:.4}

#expEstimate{font-size:13px;color:var(--dim);margin-top:6px;min-height:16px;letter-spacing:.02em}
#expElapsed{display:none;font-size:10px;color:var(--amber);margin-top:4px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="container">
  <div id="hdr">
    <h1>F13LD.mesh <span class="ver">v0.1 · step 3</span></h1>
    <div class="mpill"><div class="mdot loading" id="mdot"></div><span id="mLabel">manifold loading</span></div>
  </div>
  <div id="errorBox"></div>
  <div id="dropzone">
    <div class="dz-icon">⬡</div>
    <div class="dz-main">Drop a JSON recipe here</div>
    <div class="dz-sub">noise &nbsp;·&nbsp; tpms &nbsp;·&nbsp; grain &nbsp;·&nbsp; spinodoid</div>
    <div class="dz-pick" id="pickBtn">or pick a file</div>
    <input type="file" id="fileInput" accept=".json,application/json">
  </div>
  <div id="recipeView">
    <div style="display:flex;flex-direction:column;flex:1;min-height:0;gap:0">
    <div id="previewArea" style="flex:1;min-height:0">
      <canvas id="threeCanvas"></canvas>
      <div id="computeOverlay">
        <div class="co-main" id="coMain">awaiting recipe…</div>
        <div class="co-sub"  id="coSub"></div>
        <button id="cancelMeshBtn" onclick="window.cancelMesh()" style="display:none;margin-top:10px;font-size:10px;font-family:inherit;padding:3px 12px;border:.5px solid var(--fail);border-radius:4px;background:rgba(248,113,113,.08);color:var(--fail);cursor:pointer">✕ cancel</button>
      </div>
      <div id="typeBadge"></div>
      <button id="reloadBtn">↩ load different</button>
      <div id="resStrip">
        <button class="res-btn active" id="btnDraft">Draft</button>
        <button class="res-btn"       id="btnStandard">Standard</button>
        <button class="res-btn"       id="btnFine">Fine</button>
      </div>
      <div id="triPill"></div>
      <div id="cellOverlay"><label>cell size</label><input type="number" id="shapeCellSizeMm" min="0.1" max="200" step="0.1" value="3" oninput="window.onCellSizeInput&&window.onCellSizeInput()"><span id="cellSizeUnit">mm / cell</span></div>
      <div id="staleBanner" style="display:none">Cell size changed — preview outdated &nbsp;<button id="staleRefreshBtn" onclick="window.triggerMesh(window.currentEdgeFraction||0.05)">↻ Update Preview</button></div>
    </div>
    <!-- ── Bounding Shape import strip ─────────────────────────────────── -->
    <div id="shapeStrip" style="display:none">
      <div id="shapeDZ">
        <span class="sdz-icon">⬡</span>
        <span class="sdz-label">Bounding Shape</span>
        <span class="sdz-sep"></span>
        <span class="sdz-pills">
          <span class="sdz-pill mesh">STL</span>
          <span class="sdz-pill mesh">OBJ</span>
          <span class="sdz-pill mesh">3MF</span>
          <span class="sdz-pill cad">STEP</span>
          <span class="sdz-pill cad">IGES</span>
        </span>
        <span class="sdz-sub">drop a shape · or click to browse</span>
        <input type="file" id="shapeInput" accept=".stl,.obj,.3mf,.step,.stp,.iges,.igs">
      </div>
      <div id="shapeCard"></div>
    </div>
    </div><!-- end previewArea+shapeStrip column -->
    <div id="panel"><div id="summaryContent"></div></div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { ThreeMFLoader } from 'three/addons/loaders/3MFLoader.js';
import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';
import * as fflate from 'fflate';

// ── Manifold ──────────────────────────────────────────────────────────────
let ManifoldAPI = null;
const mdot = document.getElementById('mdot'), mLabel = document.getElementById('mLabel');
function setMS(s,t){mdot.className='mdot '+s;mLabel.textContent=t;}

const manifoldReady = (async()=>{
  try{
    const mod=await import('https://cdn.jsdelivr.net/npm/manifold-3d@3.4.1/+esm');
    const wasm=await mod.default();wasm.setup();ManifoldAPI=wasm;
    setMS('ready','manifold ready');return wasm;
  }catch(e){setMS('error','manifold failed');console.error(e);return null;}
})();

// ── Noise primitives (verbatim port from mesher.js) ───────────────────────
const Noise=(()=>{
  function mod289(x){return x-Math.floor(x/289)*289;}
  function permute(x){return mod289(((x*34)+1)*x);}
  function tis(r){return 1.79284291400159-0.85373472095314*r;}
  function snoise(vx,vy,vz){
    var C0=1/6,C1=1/3,s=(vx+vy+vz)*C1;
    var ix=Math.floor(vx+s),iy=Math.floor(vy+s),iz=Math.floor(vz+s);
    var t=(ix+iy+iz)*C0,x0x=vx-ix+t,x0y=vy-iy+t,x0z=vz-iz+t;
    var gx=x0x>=x0y?1:0,gy=x0y>=x0z?1:0,gz=x0z>=x0x?1:0,lx=1-gx,ly=1-gy,lz=1-gz;
    var i1x=Math.min(gx,lz),i1y=Math.min(gy,lx),i1z=Math.min(gz,ly);
    var i2x=Math.max(gx,lz),i2y=Math.max(gy,lx),i2z=Math.max(gz,ly);
    var x1x=x0x-i1x+C0,x1y=x0y-i1y+C0,x1z=x0z-i1z+C0;
    var x2x=x0x-i2x+C1,x2y=x0y-i2y+C1,x2z=x0z-i2z+C1;
    var x3x=x0x-0.5,x3y=x0y-0.5,x3z=x0z-0.5;
    ix=mod289(ix);iy=mod289(iy);iz=mod289(iz);
    var p0=permute(permute(permute(iz)+iy)+ix);
    var p1=permute(permute(permute(iz+i1z)+iy+i1y)+ix+i1x);
    var p2=permute(permute(permute(iz+i2z)+iy+i2y)+ix+i2x);
    var p3=permute(permute(permute(iz+1)+iy+1)+ix+1);
    var nx=0.285714285714,ny=-0.928571428571,nz=0.142857142857;
    var j0=p0-49*Math.floor(p0*nz*nz),j1=p1-49*Math.floor(p1*nz*nz);
    var j2=p2-49*Math.floor(p2*nz*nz),j3=p3-49*Math.floor(p3*nz*nz);
    var x0_=Math.floor(j0*nz),y0_=Math.floor(j0-7*x0_);
    var x1_=Math.floor(j1*nz),y1_=Math.floor(j1-7*x1_);
    var x2_=Math.floor(j2*nz),y2_=Math.floor(j2-7*x2_);
    var x3_=Math.floor(j3*nz),y3_=Math.floor(j3-7*x3_);
    function grad(xs,ys){var h=1-Math.abs(xs)-Math.abs(ys),sh=h<=0?-1:0;return[xs+(Math.floor(xs)*2+1)*sh,ys+(Math.floor(ys)*2+1)*sh,h];}
    var g0=grad(x0_*nx+ny,y0_*nx+ny),g1=grad(x1_*nx+ny,y1_*nx+ny),g2=grad(x2_*nx+ny,y2_*nx+ny),g3=grad(x3_*nx+ny,y3_*nx+ny);
    var n0=tis(g0[0]*g0[0]+g0[1]*g0[1]+g0[2]*g0[2]),n1=tis(g1[0]*g1[0]+g1[1]*g1[1]+g1[2]*g1[2]);
    var n2=tis(g2[0]*g2[0]+g2[1]*g2[1]+g2[2]*g2[2]),n3=tis(g3[0]*g3[0]+g3[1]*g3[1]+g3[2]*g3[2]);
    g0[0]*=n0;g0[1]*=n0;g0[2]*=n0;g1[0]*=n1;g1[1]*=n1;g1[2]*=n1;
    g2[0]*=n2;g2[1]*=n2;g2[2]*=n2;g3[0]*=n3;g3[1]*=n3;g3[2]*=n3;
    var m0=Math.max(0.6-(x0x*x0x+x0y*x0y+x0z*x0z),0);m0*=m0;
    var m1=Math.max(0.6-(x1x*x1x+x1y*x1y+x1z*x1z),0);m1*=m1;
    var m2=Math.max(0.6-(x2x*x2x+x2y*x2y+x2z*x2z),0);m2*=m2;
    var m3=Math.max(0.6-(x3x*x3x+x3y*x3y+x3z*x3z),0);m3*=m3;
    return 42*(m0*m0*(g0[0]*x0x+g0[1]*x0y+g0[2]*x0z)+m1*m1*(g1[0]*x1x+g1[1]*x1y+g1[2]*x1z)+
               m2*m2*(g2[0]*x2x+g2[1]*x2y+g2[2]*x2z)+m3*m3*(g3[0]*x3x+g3[1]*x3y+g3[2]*x3z));
  }
  function frac(x){return x-Math.floor(x);}
  function cellular(px,py,pz,metric){
    var pix=Math.floor(px),piy=Math.floor(py),piz=Math.floor(pz),pfx=px-pix,pfy=py-piy,pfz=pz-piz,d1=10,d2=10;
    for(var oz=-1;oz<=1;oz++)for(var oy=-1;oy<=1;oy++)for(var ox=-1;ox<=1;ox++){
      var cx=pix+ox,cy=piy+oy,cz=piz+oz;
      var rpx=frac(Math.sin(cx*127.1+cy*311.7+cz*74.7)*43758.5453);

    const tile=f.rd_tile||1;
    const grid=buildGrayScott(rdParams,N);
    function frac(x){return x-Math.floor(x);}
    return p=>{
      const u=frac((p[0]/10+0.5)*tile);
      const v=frac((p[1]/10+0.5)*tile);
      const w=frac((p[2]/10+0.5)*tile);
      const raw=evalRDField(grid,N,u,v,w);
      if(topo==='half') return g.half_invert?(center-raw):(raw-center);
      if(topo==='solid') return center-raw;
      return halfW-Math.abs(raw-center);
    };
  }

  // ── Wave / kernel branch ───────────────────────────────────────────
  let dirTheta=0,dirPhi=0;
  if(f.dir_mode==='single'&&f.principal_direction){
    const[mx,my,mz]=f.principal_direction;
    dirTheta=Math.acos(Math.max(-1,Math.min(1,mz)))*180/Math.PI;
    dirPhi=Math.atan2(my,mx)*180/Math.PI;
  }
  const params={fieldType:f.type,nWaves:f.n_waves||48,kappa:f.kappa||6,frequency:f.frequency||.27,rngSeed:f.rng_seed||42,dirMode:f.dir_mode||'single',dirTheta,dirPhi,wX:f.ortho_weights?.[0]??.33,wY:f.ortho_weights?.[1]??.33,wZ:f.ortho_weights?.[2]??.34,grfSigma:f.grf_sigma||.45,huN:f.hu_n||80,huAspect:f.hu_aspect||4,huWidth:f.hu_width||.04};
  const isHU=f.type==='hyperuniform';
  const waves=isHU?null:(f.type==='gaussian'?buildGRFWaves(params):buildSpinodoidWaves(params));
  const kernels=isHU?buildHUKernels(params):null;
  const PI5=Math.PI/5;
  return p=>{
    let raw;
    if(isHU){
      raw=evalHUField(kernels,0.5+p[0]/10,0.5+p[1]/10,0.5+p[2]/10);
    }else{
      raw=evalField(waves,p[0]*PI5,p[1]*PI5,p[2]*PI5,null);
    }
    if(topo==='half') return g.half_invert?(center-raw):(raw-center);
    return halfW-Math.abs(raw-center);
  };
}

// ── Extract flat position + index arrays from any Three.js geometry ───────
function geometryToArrays(geo){
  if(!geo.attributes.position) return null;
  // STL (and some OBJ) files have unwelded vertices — every triangle owns 3 unique
  // verts with no sharing. Manifold requires welded topology or it throws ManifoldError.
  // mergeVertices() welds coincident vertices and produces a proper indexed geometry.
  const welded = mergeVertices(geo, 1e-6); // 1 micron tolerance
  console.log(`[F13LD.mesh] mergeVertices: ${geo.attributes.position.count} → ${welded.attributes.position.count} verts`);
  const pos = Array.from(welded.attributes.position.array);
  const idx = welded.index ? Array.from(welded.index.array)
    : Array.from({length: pos.length/3}, (_,i) => i);
  return {pos, idx};
}

function mergeArrays(list){
  const allPos=[], allIdx=[];
  let offset=0;
  for(const {pos,idx} of list){
    allPos.push(...pos);
    allIdx.push(...idx.map(i=>i+offset));
    offset += pos.length/3;
  }
  return {pos:allPos, idx:allIdx};
}

function groupToArrays(obj){
  const list=[];
  obj.traverse(child=>{
    if(child.isMesh && child.geometry){
      const r=geometryToArrays(child.geometry);
      if(r) list.push(r);
    }
  });
  return mergeArrays(list);
}

// ── Compute shape bounding box (mm). Returns bbox + a display-only normaliser ──
function computeShapeBbox(pos){
  let mnx=Infinity,mny=Infinity,mnz=Infinity,mxx=-Infinity,mxy=-Infinity,mxz=-Infinity;
  for(let i=0;i<pos.length;i+=3){
    if(pos[i]<mnx)mnx=pos[i]; if(pos[i]>mxx)mxx=pos[i];
    if(pos[i+1]<mny)mny=pos[i+1]; if(pos[i+1]>mxy)mxy=pos[i+1];
    if(pos[i+2]<mnz)mnz=pos[i+2]; if(pos[i+2]>mxz)mxz=pos[i+2];
  }
  const cx=(mnx+mxx)/2, cy=(mny+mxy)/2, cz=(mnz+mxz)/2;
  const dx=mxx-mnx, dy=mxy-mny, dz=mxz-mnz;
  const maxDim=Math.max(dx,dy,dz,0.001);
  // displayNorm is used ONLY to fit the shape into Three.js [-5,5] view — never for Manifold
  const displayNorm={cx,cy,cz,scale:10/maxDim};
  const bboxStr=`${dx.toFixed(1)}×${dy.toFixed(1)}×${dz.toFixed(1)} mm`;
  return {mnx,mny,mnz,mxx,mxy,mxz,cx,cy,cz,dx,dy,dz,maxDim,bboxStr,displayNorm};
}

// ── Build Manifold from raw mm positions ─────────────────────────────────
async function buildShapeManifold(pos, idx){
  await manifoldReady;
  if(!ManifoldAPI) throw new Error('Manifold not ready');
  const vertProperties = pos instanceof Float32Array ? pos : new Float32Array(pos);
  const triVerts = new Uint32Array(idx);
  console.log('[F13LD.mesh] buildShapeManifold:', vertProperties.length/3, 'verts,', triVerts.length/3, 'tris');
  console.log('[F13LD.mesh] ManifoldAPI.Mesh available:', typeof ManifoldAPI.Mesh);

  // Manifold requires mergeFromVert/mergeToVert to understand mesh topology when
  // vertices are duplicated (as in STL/graphics-library meshes). The correct pattern
  // per Manifold docs: construct a WASM Mesh object, call .merge() to auto-fill
  // the merge vectors from geometry, then pass to the Manifold constructor.
  let mfld;
  try{
    const wasmMesh = new ManifoldAPI.Mesh({ numProp: 3, vertProperties, triVerts });
    console.log('[F13LD.mesh] ManifoldAPI.Mesh constructed OK, calling .merge()...');
    wasmMesh.merge();
    console.log('[F13LD.mesh] .merge() complete, constructing Manifold...');
    mfld = new ManifoldAPI.Manifold(wasmMesh);
    console.log('[F13LD.mesh] Manifold constructed OK, isEmpty:', mfld.isEmpty());
  }catch(e){
    console.error('[F13LD.mesh] Mesh/merge/Manifold construction failed:', e);
    throw new Error('Manifold construction failed -- see console for details.');
  }
  if(mfld.isEmpty()) throw new Error('Manifold reports empty -- mesh may have unresolvable topology errors.');
  return mfld;
}

async function handleShapeFile(file){
  const name=file.name, ext=name.split('.').pop().toLowerCase();
  setShapeUI('loading', name);
  clearShapeWire();
  if(importedShape){try{importedShape.manifold.delete();}catch(_){} importedShape=null;}
  try{
    let pos, idx, format;
    if(ext==='stl'){
      format='STL';
      const buf=await file.arrayBuffer();
      const geo = new STLLoader().parse(buf);
      ({pos,idx}=geometryToArrays(geo));
    } else if(ext==='obj'){
      format='OBJ';
      const text=await file.text();
      const group=new OBJLoader().parse(text);
      ({pos,idx}=groupToArrays(group));
    } else if(ext==='3mf'){
      format='3MF';
      const buf=await file.arrayBuffer();
      // ⚠ API UNCERTAIN: ThreeMFLoader may not have parseAsync — if this throws,
      // it may be .parse(buf) only; check console
      console.log('[F13LD.mesh] ThreeMFLoader: calling parseAsync…');
      let group;
      try{
        group=await new ThreeMFLoader().parseAsync(buf);
      }catch(e){
        console.warn('[F13LD.mesh] parseAsync failed, trying sync parse:', e);
        group=new ThreeMFLoader().parse(buf);
      }
      ({pos,idx}=groupToArrays(group));
    } else if(['step','stp'].includes(ext)){
      format='STEP';
      ({pos,idx}=await loadCADFormat(file,'step'));
    } else if(['iges','igs'].includes(ext)){
      format='IGES';
      ({pos,idx}=await loadCADFormat(file,'iges'));
    } else {
      throw new Error('Unsupported format: .'+ext);
    }
    if(!pos||pos.length===0) throw new Error('No geometry found in file.');
    const posArr = new Float32Array(pos);
    const idxArr = new Uint32Array(idx);
    const tris=Math.floor(idxArr.length/3);
    const bbox=computeShapeBbox(posArr); // shape stays in mm — no vertex transform
    const manifold=await buildShapeManifold(posArr, idxArr);
    // suggest cell size as ~1/5 of the longest dimension (user can override)
    const suggestedCell=Math.max(0.5, parseFloat((bbox.maxDim/5).toFixed(1)));
    importedShape={manifold, posArr, idxArr, bbox, meta:{name,format,tris,bbox:bbox.bboxStr}};
    if(threeReady) displayShapeWire(posArr, idxArr, bbox.displayNorm);
    setShapeUI('ok', name, {format,tris,bbox:bbox.bboxStr}, null, suggestedCell);
    updateExportEstimate();
    if(currentRecipe) triggerMesh(0.05);
  } catch(e){
    importedShape=null;
    setShapeUI('err', name, null, e.message||String(e));
    console.error(e);
  }
}

async function loadCADFormat(file, type){
  const occt=await getOCCT();
  const buf=await file.arrayBuffer();
  const bytes=new Uint8Array(buf);
  // Result schema (Three.js-compatible per official docs):
  //   result.meshes[i].attributes.position.array — flat vertex positions
  //   result.meshes[i].index.array               — flat triangle indices
  const result=type==='step' ? occt.ReadStepFile(bytes) : occt.ReadIgesFile(bytes);
  console.log('[OCCT] success:',result.success,'meshes:',result.meshes?.length,'keys:',Object.keys(result));
  if(!result.success) throw new Error('OCCT could not parse '+type.toUpperCase()+' file.');
  const allPos=[], allIdx=[];
  let offset=0;
  for(const mesh of result.meshes||[]){
    const pos=mesh.attributes?.position?.array;
    const idx=mesh.index?.array;
    if(!pos||!idx){console.warn('[OCCT] mesh missing position/index, keys:',Object.keys(mesh));continue;}
    for(let i=0;i<pos.length;i++) allPos.push(pos[i]);
    for(let i=0;i<idx.length;i++) allIdx.push(idx[i]+offset);
    offset+=pos.length/3;
  }
  return {pos:allPos, idx:allIdx};
}

// ── Resolution multiplier from recipe geometry ────────────────────────────────
// Thinner walls and lower VF = more triangles needed per cell period.
// Returns a multiplier > 1 that divides the base edge fraction (finer mesh).
function extractResolutionMultiplier(recipe){
  if(!recipe) return 1;
  const j=recipe.json, g=j.geometry||{}, h=j.homogenization;

  // ── Wall fraction signal ──────────────────────────────────────────────────
  // Normalise each geometry param to a [0.1, 1.0] "wall fullness" fraction.
  // Reference "full" values chosen from typical mid-range design parameters.
  let wallFrac=1.0;
  if(g.wall_thickness!=null){
    wallFrac=Math.max(0.1, Math.min(1.0, g.wall_thickness/0.30));
  } else if(g.half_width!=null){
    // half_width is half the wall as fraction of field range; *2 for full wall
    wallFrac=Math.max(0.1, Math.min(1.0, (g.half_width*2)/0.30));
  } else if(g.pipe_radius!=null){
    wallFrac=Math.max(0.1, Math.min(1.0, g.pipe_radius/0.18));
  }
  const wallMult=Math.min(4, Math.max(1, 0.3/wallFrac));

  // ── Volume fraction signal (bonus refinement when homogenization present) ──
  let vfMult=1.0;
  if(h && h.volume_fraction!=null){
    const vf=h.volume_fraction/100; // convert % to fraction
    if(vf>0) vfMult=Math.min(3, Math.max(1, Math.sqrt(0.15/vf)));
  }

  const mult=wallMult*vfMult;
  console.log(`[F13LD.mesh] resolutionMult: wall=${wallFrac.toFixed(2)} wallMult=${wallMult.toFixed(2)} vfMult=${vfMult.toFixed(2)} total=${mult.toFixed(2)}`);
  return mult;
}

function buildNoiseSDF(json){

    const raw=evalNoiseRaw(surf,px*SCALE*freq*sx,py*SCALE*freq*sy,pz*SCALE*freq*sz);

    // World space is [-5,5]; noise tool uses [-pi,pi]*SCALE — match exactly
    const raw=evalNoiseRaw(surf,p[0]*SCALE2*freq*sx,p[1]*SCALE2*freq*sy,p[2]*SCALE2*freq*sz);

    if(t.startsWith('sin'))return Math.sin(val);
    if(t.startsWith('cos'))return Math.cos(val);
    return 1;
  }
  function evalTerms(tx,ty,tz){
    let sum=0;
    for(const term of terms){if(!term.on)continue;let prod=term.coef??1;for(const f of term.factors)prod*=evalFactor(f,tx,ty,tz);sum+=prod;}
    return sum;
  }

  function evalPhi(tx,ty,tz){
    return rawFn ? rawFn(tx,ty,tz) : evalTerms(tx,ty,tz);
  }

  return p=>{
    const tx=p[0]*freqScale,ty=p[1]*freqScale,tz=p[2]*freqScale;
    const phiA=evalPhi(tx,ty,tz);
    if(mode==='pi-tpms'){
      const phiB=evalPhi(tx+(ps.x||0)*TP,ty+(ps.y||0)*TP,tz+(ps.z||0)*TP);
      return (g.pipe_radius||.18)-Math.max(Math.abs(phiA),Math.abs(phiB));
    }
    if(mode==='solid') return (g.offset||0)-phiA;
    return ((g.wall_thickness||.3)/2)-Math.abs(phiA-(g.offset||0));
  };
}

function buildGrainSDF(json){
  const f=json.field,g=json.geometry||{};
  const center=g.center??0,halfW=g.half_width??.15,topo=g.topology||'sheet';

  // ── Reaction-diffusion branch ──────────────────────────────────────
  if(f.type==='reactiondiffusion'){
    const N=48;
    const rdParams={rdF:f.rd_F||0.030,rdK:f.rd_k||0.057,rdDu:f.rd_Du||0.14,rdSteps:f.rd_steps||3000,rngSeed:f.rng_seed||42};
    const tile=f.rd_tile||1;
    const grid=buildGrayScott(rdParams,N);
    function frac(x){return x-Math.floor(x);}
    return p=>{
      const u=frac((p[0]/10+0.5)*tile);
      const v=frac((p[1]/10+0.5)*tile);
      const w=frac((p[2]/10+0.5)*tile);
      const raw=evalRDField(grid,N,u,v,w);
      if(topo==='half') return g.half_invert?(center-raw):(raw-center);
      if(topo==='solid') return center-raw;
      return halfW-Math.abs(raw-center);
    };
  }

  // ── Wave / kernel branch ───────────────────────────────────────────
  let dirTheta=0,dirPhi=0;
  if(f.dir_mode==='single'&&f.principal_direction){
    const[mx,my,mz]=f.principal_direction;
    dirTheta=Math.acos(Math.max(-1,Math.min(1,mz)))*180/Math.PI;
    dirPhi=Math.atan2(my,mx)*180/Math.PI;
  }
  const params={fieldType:f.type,nWaves:f.n_waves||48,kappa:f.kappa||6,frequency:f.frequency||.27,rngSeed:f.rng_seed||42,dirMode:f.dir_mode||'single',dirTheta,dirPhi,wX:f.ortho_weights?.[0]??.33,wY:f.ortho_weights?.[1]??.33,wZ:f.ortho_weights?.[2]??.34,grfSigma:f.grf_sigma||.45,huN:f.hu_n||80,huAspect:f.hu_aspect||4,huWidth:f.hu_width||.04};
  const isHU=f.type==='hyperuniform';
  const waves=isHU?null:(f.type==='gaussian'?buildGRFWaves(params):buildSpinodoidWaves(params));
  const kernels=isHU?buildHUKernels(params):null;
  const PI5=Math.PI/5;
  return p=>{
    let raw;
    if(isHU){
      raw=evalHUField(kernels,0.5+p[0]/10,0.5+p[1]/10,0.5+p[2]/10);
    }else{
      raw=evalField(waves,p[0]*PI5,p[1]*PI5,p[2]*PI5,null);
    }
    if(topo==='half') return g.half_invert?(center-raw):(raw-center);
    return halfW-Math.abs(raw-center);
  };
}

function buildSDF(recipe){
  if(recipe.family==='noise')return buildNoiseSDF(recipe.json);
  if(recipe.family==='tpms') return buildTPMSSDF(recipe.json);
  if(recipe.family==='grain')return buildGrainSDF(recipe.json);
  throw new Error('No evaluator for family: '+recipe.family);
}

// ── Grid size safety clamp ────────────────────────────────────────────────────
// Prevents WASM memory crash when cell size is tiny or resMult is large.
// Returns { safeEdge, clamped, estVoxels } — safeEdge is always >= minSafeEdge.
function clampEdgeMm(edgeMm, bbox, maxVoxels){
  const vol=(bbox.mxx-bbox.mnx)*(bbox.mxy-bbox.mny)*(bbox.mxz-bbox.mnz);
  const minSafeEdge=Math.pow(vol/maxVoxels, 1/3);
  const clamped=edgeMm<minSafeEdge;
  const safeEdge=clamped?minSafeEdge:edgeMm;
  const estVoxels=vol/Math.pow(safeEdge,3);
  return{safeEdge,clamped,estVoxels:Math.round(estVoxels)};
}
function clampEdgeWorld(edgeWorld, maxVoxels){
  // cube mode: domain is 10x10x10 world units
  const vol=1000;
  const minSafeEdge=Math.pow(vol/maxVoxels,1/3);
  const clamped=edgeWorld<minSafeEdge;
  const safeEdge=clamped?minSafeEdge:edgeWorld;
  return{safeEdge,clamped};
}

let currentManifold=null;
async function triggerMesh(edgeFraction){
  currentEdgeFraction=edgeFraction;
  if(meshWorker){meshWorker.terminate();meshWorker=null;}
  clearStale();
  showComputing('computing mesh...','starting...');
  setBtns(false);showCancelBtn(true);
  const displayNorm=importedShape?importedShape.bbox.displayNorm:null;
  try{
    const worker=new Worker(getWorkerBlobUrl());
    meshWorker=worker;
    const result=await new Promise((resolve,reject)=>{
      worker.onmessage=e=>{
        const d=e.data;
        if(d.type==='progress') coSub.textContent=d.stage;
        else if(d.type==='done') resolve(d);
        else if(d.type==='error') reject(new Error(d.message));
      };
      worker.onerror=e=>reject(new Error(e.message||'Worker error'));
      if(importedShape){
        const cellSizeMm=parseFloat(document.getElementById('shapeCellSizeMm')?.value)||3;
        const posBuffer=importedShape.posArr.buffer.slice(0);
        const idxBuffer=importedShape.idxArr.buffer.slice(0);
        const{mnx,mny,mnz,mxx,mxy,mxz}=importedShape.bbox;
        const resMult=extractResolutionMultiplier(currentRecipe);
        const rawEdgeMm=(edgeFraction/resMult)*cellSizeMm;
        const{safeEdge:mmEdge,clamped}=clampEdgeMm(rawEdgeMm,importedShape.bbox,MAX_PREVIEW_VOXELS);
        if(clamped) coSub.textContent='grid clamped — cell size too small for this domain (using '+mmEdge.toFixed(2)+'mm edge)';
        const adjEdgeFraction=mmEdge/cellSizeMm;
        const simplifyTol=mmEdge*0.15;
        worker.postMessage({
          mode:'shape',recipe:currentRecipe,
          shapePos:posBuffer,shapeIdx:idxBuffer,
          bbox:{mnx,mny,mnz,mxx,mxy,mxz},
          cellSizeMm,edgeFraction:adjEdgeFraction,simplifyTol
        },[posBuffer,idxBuffer]);
      } else {
        const{safeEdge:edgeWorld,clamped:cubeClamped}=clampEdgeWorld(edgeFraction,MAX_PREVIEW_VOXELS);
        if(cubeClamped) coSub.textContent='grid clamped — edge floor '+edgeWorld.toFixed(3);
        worker.postMessage({
          mode:'cube',recipe:currentRecipe,
          edgeWorld,
          simplifyTol:edgeWorld*0.15
        });
      }
    });
    if(meshWorker===worker){meshWorker=null;}
    worker.terminate();
    const vertProperties=new Float32Array(result.vertProperties);
    const triVerts=new Uint32Array(result.triVerts);
    if(currentManifold){try{currentManifold.delete();}catch(_){} currentManifold=null;}
    displayMesh({vertProperties,triVerts},displayNorm);
    showTriCount(result.triCount,result.ms);
    hideComputing();
  }catch(e){
    if(meshWorker){meshWorker.terminate();meshWorker=null;}
    hideComputing();
    if(e.message!=='cancelled') showError('Mesh error: '+(e.message||e));
    console.error(e);
  }finally{
    setBtns(true);showCancelBtn(false);
  }
}

// ── Mesh statistics estimator ─────────────────────────────────────────────────
// Surface-area based estimate — far more accurate than voxel counting.
// Empirical formula derived from real exports: vol * K / (cellSizeMm * edgeMm²)
// where K ≈ 1.5 gives ~13% error for typical TPMS/spinodoid at Fine quality.
function estimateMeshStats(recipe, edgeMm, bbox, cellSizeMm){
  const g=recipe?.json?.geometry||{};
  const wallFrac=g.wall_thickness!=null?Math.min(1,g.wall_thickness/0.30)
                :g.half_width!=null?Math.min(1,(g.half_width*2)/0.30)
                :g.pipe_radius!=null?Math.min(1,g.pipe_radius/0.18):0.5;
  let estTris;
  if(bbox && cellSizeMm){
    // Shape mode: surface-area model
    // Triangles ≈ domainVol × wallFrac × 1.5 / (cellSizeMm × edgeMm²)
    const vol=(bbox.mxx-bbox.mnx)*(bbox.mxy-bbox.mny)*(bbox.mxz-bbox.mnz);
    estTris=Math.round(vol*wallFrac*1.5/(cellSizeMm*edgeMm*edgeMm));
  } else {
    // Cube mode: small fixed domain, simpler estimate
    const vol=1000; // 10^3 world units
    const surfFactor=Math.min(0.3, wallFrac*0.3);
    estTris=Math.round(vol/Math.pow(edgeMm,3)*surfFactor);
  }
  estTris=Math.max(1000, estTris);
  // Empirical: ~0.08ms per triangle (validated: 305k tris → ~25s)
  const estSec=Math.max(1,Math.round(estTris*0.00008));
  return{estTris,estSec};
}
window.triggerExport=async function(){
  if(!currentRecipe)return;
  if(meshWorker){meshWorker.terminate();meshWorker=null;}
  const btn=document.getElementById('expBtn');
  const report=document.getElementById('expReport');
  btn.disabled=true;btn.classList.add('sweeping');btn.textContent='computing...';report.innerHTML='';
  // elapsed counter
  const elapsedEl=document.getElementById('expElapsed');
  let elapsedSec=0,elapsedTimer=null;
  if(elapsedEl){elapsedEl.style.display='block';elapsedEl.textContent='elapsed: 0s';
    elapsedTimer=setInterval(()=>{elapsedSec++;elapsedEl.textContent='elapsed: '+elapsedSec+'s';},1000);}

  // Compute params on main thread (lightweight math only)
  let workerMsg, scale, domainLabel, edgeLabel;
  if(importedShape){
    const cellSizeMm=parseFloat(document.getElementById('shapeCellSizeMm')?.value)||3;
    const resMult=extractResolutionMultiplier(currentRecipe);
    const rawRelEdgeMm=(EXPORT_EDGE_FRAC[currentExportQual]/resMult)*cellSizeMm;
    const {mnx,mny,mnz,mxx,mxy,mxz}=importedShape.bbox;
    const{safeEdge:relEdgeMm,clamped:exportClamped}=clampEdgeMm(rawRelEdgeMm,importedShape.bbox,MAX_EXPORT_VOXELS);
    const simplifyTol=(EXPORT_SIMPLIFY_FRAC[currentExportQual]/resMult)*cellSizeMm;
    const posBuffer=importedShape.posArr.buffer.slice(0);
    const idxBuffer=importedShape.idxArr.buffer.slice(0);
    const {estTris,estSec}=estimateMeshStats(currentRecipe,relEdgeMm,importedShape.bbox,cellSizeMm);
    if(exportClamped) console.warn('[export] grid clamped to '+relEdgeMm.toFixed(3)+'mm — cell size too small for export voxel budget');
    coMain.textContent='exporting...';
    coSub.textContent='~'+(estTris/1e6).toFixed(1)+'M tris estimated · ~'+estSec+'s';
    overlay.classList.remove('hidden');showCancelBtn(true);
    scale=1.0;
    domainLabel=importedShape.meta.bbox;
    edgeLabel=relEdgeMm.toFixed(2)+'mm';
    workerMsg={
      mode:'export',recipe:currentRecipe,
      shapePos:posBuffer,shapeIdx:idxBuffer,
      bbox:{mnx,mny,mnz,mxx,mxy,mxz},
      cellSizeMm,relEdgeMm,simplifyTol,scale
    };
  } else {
    const domainEl=document.getElementById('expDomainMm');
    const domainMm=Math.max(1,Math.min(100,parseFloat(domainEl?.value)||10));
    const edgeMm=QUAL_EDGE_MM[currentExportQual]||.10;
    const edgeWorld=edgeMm*10/domainMm;
    const {estTris,estSec}=estimateMeshStats(currentRecipe,edgeWorld,null);
    coMain.textContent='exporting...';
    coSub.textContent='~'+(estTris/1e6).toFixed(1)+'M tris estimated · ~'+estSec+'s';
    overlay.classList.remove('hidden');showCancelBtn(true);
    scale=domainMm/10;
    domainLabel=domainMm+'mm';
    edgeLabel=edgeMm+'mm';
    workerMsg={mode:'export',recipe:currentRecipe,edgeWorld,simplifyTol:0,scale};
  }

  try{
    const worker=new Worker(getWorkerBlobUrl());
    meshWorker=worker;
    const result=await new Promise((resolve,reject)=>{
      worker.onmessage=e=>{
        const d=e.data;
        if(d.type==='progress') coSub.textContent=d.stage;
        else if(d.type==='done') resolve(d);
        else if(d.type==='error') reject(new Error(d.message));
      };
      worker.onerror=e=>reject(new Error(e.message||'Worker error'));
      if(workerMsg.shapePos){
        worker.postMessage(workerMsg,[workerMsg.shapePos,workerMsg.shapeIdx]);
      } else {
        worker.postMessage(workerMsg);
      }
    });
    if(meshWorker===worker){meshWorker=null;}
    worker.terminate();
    if(elapsedTimer)clearInterval(elapsedTimer);
    hideComputing();showCancelBtn(false);
    btn.textContent='building 3MF...';
    const vertProps=new Float32Array(result.vertProperties);
    const triVerts=new Uint32Array(result.triVerts);
    const blob=await buildMinimal3MF(vertProps,triVerts,result.scale??scale);
    const j=currentRecipe.json;
    const preset=j.surface?.preset||j.surface?.noise_type||j.field?.type||currentRecipe.subtype;
    const shapeSuffix=importedShape?('_'+importedShape.meta.name.replace(/\.[^.]+$/,'')):'';
    const ts=new Date().toISOString().slice(0,10);
    const filename=currentRecipe.family+'_'+preset+shapeSuffix+'_'+ts+'.3mf';
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    report.innerHTML='<div class="exp-report">'+
      expChip('triangles',result.triCount.toLocaleString())+
      expChip('domain',domainLabel)+
      expChip('edge',edgeLabel)+
      expChip('file',(blob.size/1024).toFixed(1)+' KB')+
      expChip('time',result.ms+'ms')+
    '</div>';
    if(elapsedEl)elapsedEl.style.display='none';
    btn.classList.remove('sweeping');btn.textContent='Export 3MF';
  }catch(e){
    if(elapsedTimer)clearInterval(elapsedTimer);
    if(elapsedEl){elapsedEl.style.display='none';}
    if(meshWorker){meshWorker.terminate();meshWorker=null;}
    hideComputing();showCancelBtn(false);
    report.innerHTML='<div class="exp-err">&#9888; '+(e.message||e)+'</div>';
    btn.classList.remove('sweeping');btn.textContent='Export 3MF';
    console.error(e);
  }
  btn.disabled=false;
};
function expChip(l,v){return`<div class="exp-chip">${l} <b>${v}</b></div>`;}

async function buildMinimal3MF(vertProps,triVerts,scale){
  const nV=vertProps.length/3,nT=triVerts.length/3;
  let vx='',tx='';
  for(let i=0;i<nV;i++)vx+=`<vertex x="${(vertProps[i*3]*scale).toFixed(6)}" y="${(vertProps[i*3+1]*scale).toFixed(6)}" z="${(vertProps[i*3+2]*scale).toFixed(6)}"/>`;
  for(let i=0;i<nT;i++)tx+=`<triangle v1="${triVerts[i*3]}" v2="${triVerts[i*3+1]}" v3="${triVerts[i*3+2]}"/>`;
  const model=`<?xml version="1.0" encoding="UTF-8"?><model unit="millimeter" xml:lang="en-US" xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02"><resources><object id="1" type="model"><mesh><vertices>${vx}</vertices><triangles>${tx}</triangles></mesh></object></resources><build><item objectid="1"/></build></model>`;
  const ct=`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml"/></Types>`;
  const rels=`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Target="/3D/3dmodel.model" Id="rel0" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel"/></Relationships>`;
  const enc=new TextEncoder();
  const zipped=fflate.zipSync({'[Content_Types].xml':enc.encode(ct),'_rels/.rels':enc.encode(rels),'3D/3dmodel.model':enc.encode(model)});
  return new Blob([zipped],{type:'model/3mf'});
}

function showError(m){errorBox.style.display='block';errorBox.textContent='⚠ '+m;}
function clearError(){errorBox.style.display='none';}
function showComputing(m,s){overlay.classList.remove('hidden');coMain.textContent=m;coSub.textContent=s||'';triPill.style.display='none';}
function hideComputing(){overlay.classList.add('hidden');}

function setStale(){
  const banner=document.getElementById('staleBanner');
  const btn=document.getElementById('staleRefreshBtn');
  const area=document.getElementById('previewArea');
  if(banner){banner.style.display='flex';}
  if(btn){btn.classList.add('pulsing');}
  if(area){area.classList.add('preview-stale');}
}
function clearStale(){
  const banner=document.getElementById('staleBanner');
  const btn=document.getElementById('staleRefreshBtn');
  const area=document.getElementById('previewArea');
  if(banner){banner.style.display='none';}
  if(btn){btn.classList.remove('pulsing');}
  if(area){area.classList.remove('preview-stale');}
}
function showTriCount(n,ms){triPill.style.display='block';triPill.textContent=n.toLocaleString()+' tri · '+ms+' ms';}
function setBtns(on){['btnDraft','btnStandard','btnFine'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=!on;});}
function setActivBtn(id){['btnDraft','btnStandard','btnFine'].forEach(b=>{const el=document.getElementById(b);if(el)el.classList.toggle('active',b===id);});}

async function showRecipe(recipe){
  clearError();currentRecipe=recipe;
  dropzone.style.display='none';recipeView.style.display='flex';
  document.getElementById('shapeStrip').style.display='block';
  typeBadge.className=recipe.family;typeBadge.textContent=FAMILY_LABEL[recipe.family]+' · '+recipe.subtype.toUpperCase();
  summaryEl.innerHTML=renderSummary(recipe);
  if(!threeReady){await new Promise(r=>setTimeout(r,60));initThreeJS();}
  resizeRenderer();setActivBtn('btnDraft');triggerMesh(0.08);
  setTimeout(updateExportEstimate,0); // panel renders async
}
function resetToDropzone(){
  recipeView.style.display='none';dropzone.style.display='flex';
  document.getElementById('shapeStrip').style.display='none';
  clearError();triPill.style.display='none';
  overlay.classList.remove('hidden');coMain.textContent='awaiting recipe…';coSub.textContent='';
  // clear any loaded shape on recipe reset
  if(importedShape){try{importedShape.manifold.delete();}catch(_){} importedShape=null;}
  clearShapeWire();setShapeUI('idle');
}
document.getElementById('reloadBtn').addEventListener('click',resetToDropzone);
document.getElementById('btnDraft').addEventListener('click',()=>{if(!currentRecipe)return;setActivBtn('btnDraft');triggerMesh(0.08);});
document.getElementById('btnStandard').addEventListener('click',()=>{if(!currentRecipe)return;setActivBtn('btnStandard');triggerMesh(0.05);});
document.getElementById('btnFine').addEventListener('click',()=>{if(!currentRecipe)return;setActivBtn('btnFine');triggerMesh(0.03);});


// ── URL ingestion — auto-load recipe from ?r= parameter ──────────────────
(function(){
  try{
    const p=new URLSearchParams(location.search);
    if(p.has('r')){
      const json=JSON.parse(decodeURIComponent(p.get('r')));
      // Wait for DOM + Manifold to be ready, then show
      setTimeout(()=>showRecipe(routeRecipe(json)),0);
    }
  }catch(e){
    console.warn('URL recipe parse error:',e);
  }
})();

// ── File handling ─────────────────────────────────────────────────────────
function handleJSON(text,filename){let json;try{json=JSON.parse(text);}catch(e){showError('Invalid JSON in '+(filename||'file')+' — '+e.message);return;}try{showRecipe(routeRecipe(json));}catch(e){showError(e.message);}}
function handleFile(file){if(!file)return;if(!file.name.toLowerCase().endsWith('.json')){showError('Expected a .json file. Got: '+file.name);return;}const reader=new FileReader();reader.onload=e=>handleJSON(e.target.result,file.name);reader.onerror=()=>showError('Could not read: '+file.name);reader.readAsText(file);}
const fileInput=document.getElementById('fileInput'),pickBtn=document.getElementById('pickBtn');
dropzone.addEventListener('click',()=>fileInput.click());
pickBtn.addEventListener('click',e=>{e.stopPropagation();fileInput.click();});
fileInput.addEventListener('change',()=>{if(fileInput.files[0])handleFile(fileInput.files[0]);fileInput.value='';});
document.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('dragover');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)dropzone.classList.remove('dragover');});
document.addEventListener('drop',e=>{e.preventDefault();dropzone.classList.remove('dragover');const f=e.dataTransfer?.files?.[0];if(f)handleFile(f);});

// ── Shape strip events ────────────────────────────────────────────────────
const shapeDZ=document.getElementById('shapeDZ');
const shapeInput=document.getElementById('shapeInput');
const SHAPE_EXTS=new Set(['stl','obj','3mf','step','stp','iges','igs']);
function isShapeFile(f){return f&&SHAPE_EXTS.has(f.name.split('.').pop().toLowerCase());}
shapeDZ.addEventListener('click',()=>shapeInput.click());
shapeInput.addEventListener('change',()=>{if(shapeInput.files[0])handleShapeFile(shapeInput.files[0]);shapeInput.value='';});
shapeDZ.addEventListener('dragover',e=>{e.stopPropagation();e.preventDefault();shapeDZ.classList.add('dragover');});
shapeDZ.addEventListener('dragleave',e=>{shapeDZ.classList.remove('dragover');});
shapeDZ.addEventListener('drop',e=>{e.stopPropagation();e.preventDefault();shapeDZ.classList.remove('dragover');const f=e.dataTransfer?.files?.[0];if(f&&isShapeFile(f))handleShapeFile(f);});

// ── Cell size stale detection (event delegation — input is dynamically rendered) ──
document.addEventListener('input',e=>{if(e.target&&e.target.id==='shapeCellSizeMm'&&importedShape){setStale();}});
</script>
