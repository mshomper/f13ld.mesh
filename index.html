<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F13LD.mesh — Scaffold Exporter</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
    "fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.2/+esm",
    "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.7.8/build/index.module.js"
  }
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700&display=swap');
:root{--bg:#06080f;--panel:#111118;--border:#2a2a3a;--text:#e0e0ff;--muted:#555;--dim:#888;--cyan:#22d3ee;--purple:#7c6ff7;--green:#18f370;--amber:#f59e0b;--fail:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif}
#container{display:flex;flex-direction:column;height:100vh}
#hdr{display:flex;align-items:center;justify-content:space-between;background:#06080f;border-bottom:0.5px solid #1a2a1a;padding:0 14px;height:48px;flex-shrink:0;font-family:'Exo 2',system-ui,sans-serif}
.fh-left{display:flex;align-items:center;gap:10px}
.fh-brand{display:flex;align-items:center;gap:8px;text-decoration:none}
.fh-wordmark{font-size:17px;font-weight:700;letter-spacing:0.1em;line-height:1}
.fh-divider{width:0.5px;height:24px;background:#1a2a1a}
.fh-tool-name{font-size:15px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;line-height:1}
.fh-right{display:flex;align-items:center;gap:10px}
.fh-version{font-size:10px;color:#2a3a2a;letter-spacing:0.1em;font-family:'Exo 2',system-ui,sans-serif}
.fh-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mpill{display:flex;align-items:center;gap:5px;background:var(--panel);border:.5px solid var(--border);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.mdot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0}
.mdot.loading{background:var(--amber);animation:pulse 1.2s infinite}
.mdot.ready{background:var(--cyan)}
.mdot.error{background:var(--fail)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#orbSpinner{display:block;margin:0 auto 4px}
@keyframes orbFade{0%,100%{opacity:.85}50%{opacity:.5}}
#orbSpinner{animation:orbFade 2s ease-in-out infinite}

#errorBox{display:none;background:rgba(248,113,113,.07);border:.5px solid var(--fail);border-radius:7px;padding:9px 12px;font-size:12px;color:#ffb4b4;margin:0 16px 8px;line-height:1.5}
#dropzone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 16px 16px;border:.5px dashed var(--border);border-radius:12px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
#dropzone:hover,#dropzone.dragover{border-color:var(--cyan);background:rgba(34,211,238,.025)}
#dropzone.dragover{border-style:solid}
.dz-icon{font-size:28px;margin-bottom:14px;opacity:.2;line-height:1}
.dz-main{font-size:13px;color:var(--dim);margin-bottom:5px}
.dz-sub{font-size:11px;color:var(--muted);letter-spacing:.04em}
.dz-pick{font-size:11px;color:var(--cyan);margin-top:12px;text-decoration:underline;text-underline-offset:3px;cursor:pointer}
#fileInput{display:none}
#recipeView{display:none;flex-direction:row;flex:1;margin:0 16px 16px;min-height:0;gap:12px;align-items:stretch}
#previewArea{flex:1;min-height:0;min-width:0;position:relative;overflow:hidden;background:var(--panel);border:.5px solid var(--border);border-radius:12px}
#threeCanvas{position:absolute;inset:0;display:block;width:100%;height:100%}
#computeOverlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;background:rgba(6,8,15,.82);z-index:4}
#computeOverlay.hidden{display:none}
.co-main{font-size:15px;color:var(--amber);font-weight:500;letter-spacing:.04em}
.co-sub{font-size:12px;color:var(--amber);opacity:.75;margin-top:3px}
#typeBadge{position:absolute;top:10px;left:10px;z-index:3;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
#typeBadge.noise{background:rgba(34,211,238,.1);color:var(--cyan);border:.5px solid var(--cyan)}
#typeBadge.tpms{background:rgba(124,111,247,.1);color:var(--purple);border:.5px solid var(--purple)}
#typeBadge.grain{background:rgba(24,243,112,.1);color:var(--green);border:.5px solid var(--green)}
#reloadBtn{position:absolute;top:10px;right:10px;z-index:3;font-size:10px;color:var(--muted);background:rgba(6,8,15,.85);border:.5px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer;font-family:inherit}
#reloadBtn:hover{color:var(--text);border-color:var(--dim)}
#resStrip{position:absolute;bottom:10px;right:10px;display:flex;gap:4px;z-index:3}
.res-btn{font-size:10px;padding:3px 8px;border:.5px solid var(--border);border-radius:5px;background:rgba(6,8,15,.85);color:var(--muted);cursor:pointer;font-family:inherit;transition:color .1s,border-color .1s}
.res-btn.active{color:var(--cyan);border-color:var(--cyan)}
.res-btn:disabled{opacity:.4;cursor:default}
#triPill{display:none;position:absolute;bottom:10px;left:10px;z-index:3;font-size:10px;color:var(--dim);background:rgba(6,8,15,.85);border:.5px solid var(--border);border-radius:5px;padding:3px 8px}
#panel{background:var(--panel);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;overflow-y:auto;width:240px;flex-shrink:0;min-height:0}
.sec-lbl{font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
hr.div{border:none;border-top:.5px solid var(--border);margin:10px 0}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-bottom:10px}
.mc{background:#0e0e1a;border:.5px solid var(--border);border-radius:7px;padding:7px 9px}
.mc-lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
.mc-val{font-size:13px;color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;word-break:break-all}
.mc-unit{font-size:10px;color:var(--muted);margin-left:2px}
.homo-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.hchip{background:#0e0e1a;border:.5px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.hchip b{color:var(--text);font-weight:500}
.hchip small{font-size:10px;color:var(--muted)}
.exp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.exp-label{font-size:12px;color:var(--dim);min-width:80px}
.exp-num{font-size:12px;padding:2px 6px;background:#1a1a2e;border:.5px solid var(--border);border-radius:5px;color:var(--text);width:60px;text-align:center;font-family:inherit}
.exp-unit{font-size:11px;color:var(--muted)}
.qual-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:100%}
.qual-btn{font-size:11px;padding:0;min-height:36px;border:.5px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;width:100%;text-align:center;transition:color .1s,border-color .1s,background .1s;line-height:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.qual-btn .ql{display:none}
.qual-btn.active{color:var(--purple);border-color:var(--purple);background:rgba(124,111,247,.1)}
.qual-btn.active .ql{color:var(--purple)}
#expBtn{width:100%;padding:7px 14px;border:.5px solid var(--cyan);border-radius:20px;background:rgba(34,211,238,.08);color:var(--cyan);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s;position:relative;overflow:hidden}
#expBtn:hover:not(:disabled){background:rgba(34,211,238,.18)}
#expBtn:disabled{opacity:.4;cursor:not-allowed;background:transparent;border-color:var(--border);color:var(--muted)}
#expBtn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(34,211,238,.18) 50%,transparent 100%);transform:translateX(-100%);pointer-events:none}
#expBtn.sweeping::after{animation:btnSweep 1s ease-in-out infinite}
@keyframes btnSweep{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.exp-report{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.exp-chip{background:#0e0e1a;border:.5px solid var(--border);border-radius:5px;padding:3px 8px;font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.exp-chip b{color:var(--text);font-weight:500}
.exp-err{font-size:11px;color:#ffb4b4;margin-top:6px;line-height:1.5}

/* ── Shape import strip ─────────────────────────────────────────────────── */
#shapeStrip{margin:0 16px;flex-shrink:0}
#shapeDZ{display:flex;align-items:center;gap:10px;padding:8px 12px;border:.5px dashed var(--border);border-radius:0 0 0 0;background:rgba(24,243,112,.025);cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
#shapeDZ:hover,#shapeDZ.dragover{border-color:var(--green);background:rgba(24,243,112,.045)}
#shapeDZ.dragover{border-style:solid}
.sdz-icon{font-size:16px;opacity:.55;flex-shrink:0;line-height:1}
.sdz-label{font-size:16px;color:var(--dim);white-space:nowrap;font-weight:500}
.sdz-sub{font-size:14px;color:var(--muted);white-space:nowrap}
.sdz-pills{display:flex;gap:3px;flex-shrink:0}
.sdz-pill{font-size:8px;letter-spacing:.08em;padding:1px 5px;border-radius:3px;border:.5px solid}
.sdz-pill.mesh{color:#5a8ae0;border-color:#2a3a5a}
.sdz-pill.cad{color:#a05ae0;border-color:#3a2a5a}
.sdz-sep{flex:1}
.sdz-hint{font-size:10px;color:var(--muted);white-space:nowrap}
#shapeInput{display:none}
/* loaded card */
#shapeCard{display:none;padding:7px 12px;border:.5px solid var(--border);border-top:none;background:var(--panel);border-radius:0}
.sc-row{display:flex;align-items:center;gap:8px}
.sc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sc-dot.ok{background:var(--green)}
.sc-dot.err{background:var(--fail)}
.sc-dot.warn{background:var(--amber)}
.sc-name{font-size:15px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:500}
.sc-chips{display:flex;gap:4px;flex-wrap:wrap}
.sc-chip{font-size:12px;color:var(--dim);background:#0e0e1a;border:.5px solid var(--border);border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums}
.sc-chip b{color:var(--text);font-weight:500}
.sc-status{font-size:13px;margin-top:4px}
.sc-status.ok{color:var(--green)}
.sc-status.err{color:#ffb4b4}
.sc-clear{font-size:10px;color:var(--muted);background:transparent;border:.5px solid var(--border);border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit;transition:color .1s,border-color .1s;flex-shrink:0}
.sc-clear:hover{color:#ffb4b4;border-color:var(--fail)}

#cancelMeshBtn:hover{background:rgba(248,113,113,.2)}
#staleBanner{position:absolute;bottom:44px;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 14px;background:rgba(245,158,11,.13);border-top:.5px solid var(--amber);border-bottom:.5px solid var(--amber);font-size:11px;color:var(--amber);pointer-events:auto}
#staleRefreshBtn{font-size:10px;font-family:inherit;padding:3px 10px;border:.5px solid var(--amber);border-radius:4px;background:rgba(245,158,11,.15);color:var(--amber);cursor:pointer;transition:background .15s}
#staleRefreshBtn:hover{background:rgba(245,158,11,.3)}
@keyframes stalePulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.5)}60%{box-shadow:0 0 0 5px rgba(245,158,11,0)}}
#staleRefreshBtn.pulsing{animation:stalePulse 1.4s ease-out infinite}
.preview-stale #threeCanvas{opacity:.35;transition:opacity .25s}
#threeCanvas{transition:opacity .25s}

#cellOverlay{position:absolute;bottom:44px;left:10px;z-index:6;display:none;align-items:center;gap:8px;background:rgba(6,8,15,.88);border:.5px solid var(--amber);border-radius:6px;padding:6px 12px}
#cellOverlay label{font-size:12px;font-weight:500;color:var(--amber);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
#cellSizeDisplay{font-size:18px;font-weight:600;color:var(--amber);font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
#cellSizeUnit{font-size:10px;color:var(--amber);opacity:.7}
#cellOverlay input[type=number]{width:60px;font-size:14px;font-weight:600;background:transparent;border:none;border-bottom:.5px solid var(--cyan);color:var(--cyan);font-family:inherit;font-variant-numeric:tabular-nums;text-align:right;outline:none;padding:0 2px;appearance:none;-moz-appearance:textfield}
#cellOverlay input[type=number]::-webkit-inner-spin-button,#cellOverlay input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;appearance:none;margin:0;display:none}

#expEstimate{font-size:13px;color:var(--dim);margin-top:6px;min-height:16px;letter-spacing:.02em}
#expElapsed{display:none;font-size:10px;color:var(--amber);margin-top:4px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="container">
  <div id="hdr">
    <div class="fh-left">
      <a class="fh-brand" href="https://f13ld.app" target="_blank">
        <svg width="24" height="24" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs><clipPath id="f13-clip"><path d="M50,5 C91,5 95,9 95,50 C95,91 91,95 50,95 C9,95 5,91 5,50 C5,9 9,5 50,5Z"/></clipPath></defs>
          <path d="M50,5 C91,5 95,9 95,50 C95,91 91,95 50,95 C9,95 5,91 5,50 C5,9 9,5 50,5Z" fill="#111e13" stroke="#1D9E75" stroke-width="5"/>
          <g clip-path="url(#f13-clip)" fill="none">
            <path d="M0,50 Q25,40 50,50 Q75,60 100,50" stroke="#c8f542" stroke-width="6"/>
            <path d="M50,0 Q40,25 50,50 Q60,75 50,100" stroke="#c8f542" stroke-width="6"/>
            <path d="M0,31 Q25,21 50,31 Q75,41 100,31" stroke="#2c4e30" stroke-width="3"/>
            <path d="M0,69 Q25,59 50,69 Q75,79 100,69" stroke="#2c4e30" stroke-width="3"/>
            <path d="M31,0 Q21,25 31,50 Q41,75 31,100" stroke="#2c4e30" stroke-width="3"/>
            <path d="M69,0 Q59,25 69,50 Q79,75 69,100" stroke="#2c4e30" stroke-width="3"/>
            <circle cx="50" cy="50" r="7" fill="#c8f542"/>
          </g>
          <path d="M50,5 C91,5 95,9 95,50 C95,91 91,95 50,95 C9,95 5,91 5,50 C5,9 9,5 50,5Z" fill="none" stroke="#1D9E75" stroke-width="5"/>
        </svg>
        <div class="fh-wordmark"><span style="color:#1D9E75">F</span><span style="color:#c8f542">1</span><span style="color:#c8f542">3</span><span style="color:#1D9E75">LD</span></div>
      </a>
      <div class="fh-divider"></div>
      <div class="fh-tool-name" style="color:#6B0A4C">MESH</div>
    </div>
    <div class="fh-right">
      <div class="mpill"><div class="mdot loading" id="mdot"></div><span id="mLabel">manifold loading</span></div>
      <span class="fh-version">v0.3.0</span>
      <div class="fh-icon" style="background:#FCEAF5">
        <svg width="18" height="18" viewBox="0 0 40 40">
          <line x1="10" y1="8" x2="22" y2="4" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="22" y1="4" x2="34" y2="8" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="34" y1="8" x2="30" y2="18" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="30" y1="18" x2="22" y2="4" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="8" x2="18" y2="18" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="22" y1="4" x2="18" y2="18" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="30" y1="18" x2="18" y2="18" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="8" x2="6" y2="22" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="6" y1="22" x2="18" y2="18" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="6" y1="22" x2="10" y2="32" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="32" x2="18" y2="18" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="32" x2="24" y2="30" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="24" y1="30" x2="18" y2="18" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="24" y1="30" x2="30" y2="18" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="30" y1="18" x2="36" y2="28" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="36" y1="28" x2="24" y2="30" stroke="#6B0A4C" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="10" cy="8" r="1.8" fill="#6B0A4C"/>
          <circle cx="22" cy="4" r="1.8" fill="#6B0A4C"/>
          <circle cx="34" cy="8" r="1.8" fill="#6B0A4C"/>
          <circle cx="18" cy="18" r="1.8" fill="#6B0A4C"/>
          <circle cx="30" cy="18" r="1.8" fill="#6B0A4C"/>
          <circle cx="6" cy="22" r="1.8" fill="#6B0A4C"/>
          <circle cx="10" cy="32" r="1.8" fill="#6B0A4C"/>
          <circle cx="24" cy="30" r="1.8" fill="#6B0A4C"/>
          <circle cx="36" cy="28" r="1.8" fill="#6B0A4C"/>
        </svg>
      </div>
    </div>
  </div>
  <div id="errorBox"></div>
  <div id="dropzone">
    <div class="dz-icon">⬡</div>
    <div class="dz-main">Drop a JSON recipe here</div>
    <div class="dz-sub">noise &nbsp;·&nbsp; tpms &nbsp;·&nbsp; grain &nbsp;·&nbsp; spinodoid</div>
    <div class="dz-pick" id="pickBtn">or pick a file</div>
    <input type="file" id="fileInput" accept=".json,application/json">
  </div>
  <div id="recipeView">
    <div style="display:flex;flex-direction:column;flex:1;min-width:0;min-height:0;gap:0">
    <div id="previewArea" style="flex:1;min-height:0">
      <canvas id="rmCanvas"></canvas>
      <canvas id="threeCanvas" style="display:none"></canvas>
      <div id="computeOverlay">
  <canvas id="orbSpinner" width="64" height="64"></canvas>
      <div class="co-main" id="coMain">awaiting recipe…</div>
        <div class="co-sub"  id="coSub"></div>
        <button id="cancelMeshBtn" onclick="window.cancelMesh()" style="display:none;margin-top:10px;font-size:10px;font-family:inherit;padding:3px 12px;border:.5px solid var(--fail);border-radius:4px;background:rgba(248,113,113,.08);color:var(--fail);cursor:pointer">✕ cancel</button>
      </div>
      <div id="typeBadge"></div>
      <button id="reloadBtn">↩ load different</button>
      <div id="resStrip">
        <button class="res-btn active" id="btnDraft">Draft</button>
        <button class="res-btn"       id="btnLow">Low</button>
        <button class="res-btn"       id="btnMed">Med</button>
        <button class="res-btn"       id="btnHigh">High</button>
        <button class="res-btn"       id="btnUltra">Ultra</button>
      </div>
      <div id="triPill"></div>
      <div id="cellOverlay"><label>cell size</label><input type="number" id="shapeCellSizeMm" min="0.1" max="200" step="0.1" value="3" oninput="window.onCellSizeInput&&window.onCellSizeInput()"><span id="cellSizeUnit">mm / cell</span></div>
      <div id="staleBanner" style="display:none">Cell size changed — preview outdated &nbsp;<button id="staleRefreshBtn" onclick="window.triggerPreview('med')">↻ Update Preview</button></div>
    </div>
    <!-- ── Bounding Shape import strip ─────────────────────────────────── -->
    <div id="shapeStrip" style="display:none">
      <div id="shapeDZ">
        <span class="sdz-icon">⬡</span>
        <span class="sdz-label">Bounding Shape</span>
        <span class="sdz-sep"></span>
        <span class="sdz-pills">
          <span class="sdz-pill mesh">STL</span>
          <span class="sdz-pill mesh">OBJ</span>
          <span class="sdz-pill mesh">3MF</span>
          <span class="sdz-pill cad">STEP</span>

// ── Preview spinner orb ──────────────────────────────────────────────────────
(function(){
  const cv=document.getElementById('orbSpinner');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  const W=64,H=64,cx=32,cy=32,R=16,STEPS=220;
  const harmonics=[[2,.7,4.2],[3,.6,6.1],[5,.5,8.7],[7,.4,5.5],[11,.3,9.3]];
  let t=0,running=false,raf=null;
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.strokeStyle='#c8f542';ctx.globalAlpha=.12;ctx.lineWidth=.7;ctx.stroke();
    ctx.beginPath();
    for(let i=0;i<=STEPS;i++){
      const theta=(i/STEPS)*Math.PI*2;
      let r=R;harmonics.forEach(([f,a,ps])=>{r+=a*Math.sin(f*theta+ps*t);});
      const x=cx+r*Math.cos(theta),y=cy+r*Math.sin(theta);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.strokeStyle='#c8f542';ctx.globalAlpha=.85;ctx.lineWidth=1.2;ctx.stroke();
    ctx.beginPath();
    for(let i=0;i<=STEPS;i++){
      const theta=(i/STEPS)*Math.PI*2;
      let r=R;harmonics.forEach(([f,a,ps])=>{r+=a*Math.sin(f*theta+ps*t+.6);});
      r-=5;
      const x=cx+r*Math.cos(theta),y=cy+r*Math.sin(theta);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.strokeStyle='#a5d8c8';ctx.globalAlpha=.22;ctx.lineWidth=.7;ctx.stroke();
    ctx.globalAlpha=1;
    t+=0.014;
    if(running)raf=requestAnimationFrame(draw);
  }
  window._orbStart=function(){if(running)return;running=true;draw();};
  window._orbStop=function(){running=false;if(raf){cancelAnimationFrame(raf);raf=null;}ctx.clearRect(0,0,W,H);};
})();

// Returns { data: Float32Array, N, sdfMin, sdfMax } in mm.
// Sign: positive outside shape, negative inside (standard SDF convention).

// count = inside). Robust for watertight meshes — avoids the face-normal
// sign-flip that occurs when the closest point lies on a shared edge or vertex.
// Module-level cancellation flag for the SDF bake. Set by window._cancelSdfBake
// (wired into cancelMesh so the existing ✕ cancel button aborts main-thread bakes
// just like it terminates worker jobs).
let _sdfBakeAborted=false;
async function computeShapeSDF(posArr, idxArr, bbox, N=128, onProgress){
  _sdfBakeAborted=false;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geo.setIndex(new THREE.BufferAttribute(idxArr, 1));
  geo.computeBoundsTree();
  const bvh = geo.boundsTree;
  const dx=bbox.mxx-bbox.mnx, dy=bbox.mxy-bbox.mny, dz=bbox.mxz-bbox.mnz;

  // non-rational components) avoids grazing coplanar faces and mesh edges.
  const ray = new THREE.Ray();
  ray.direction.set(0.9732, 0.1894, 0.1225).normalize();
  // Time-based yield cadence: yield to the browser every ~16ms of elapsed
  // work so the UI (orb spinner, overlay text) animates at ~60fps during the
  // bake. Fixed slice-count yields break down at higher N — at N=128, a single
  // slice can take 50-80ms on typical meshes, so even "every 1 slice" would
  // miss frames. Time-based is robust to any N and any per-voxel cost.
  let lastYield=performance.now();
  for(let iz=0; iz<N; iz++){
    for(let iy=0; iy<N; iy++){
      for(let ix=0; ix<N; ix++){
        qp.set(
          bbox.mnx+(ix+0.5)/N*dx,
          bbox.mny+(iy+0.5)/N*dy,
          bbox.mnz+(iz+0.5)/N*dz
        );
        // Magnitude: distance to the closest surface point.
        bvh.closestPointToPoint(qp, closest);
        const dist = qp.distanceTo(closest.point);
        // Sign: raycast-parity. Count all surface crossings along the ray;
        // odd count => query is inside the (watertight) shape.
        ray.origin.copy(qp);
        const hits = bvh.raycast(ray, THREE.DoubleSide);
        const inside = (hits.length & 1) === 1;
        const val = inside ? -dist : dist;

        if(val<minV) minV=val;
        if(val>maxV) maxV=val;

      await new Promise(r=>setTimeout(r,0));
      lastYield=performance.now();
      if(_sdfBakeAborted){geo.disposeBoundsTree();geo.dispose();throw new Error('cancelled');}

    // R16F is core WebGL 2.0 — no extension dependency. Precision is ~0.01mm
    // at SDF=10mm range (vs R8's 0.09mm), which eliminates the gradient step-
    // wise noise responsible for specular speckle on cap surfaces. R16F range
    // (±65504) comfortably exceeds any realistic shape bbox distance.
    if(!this.shapeTex)this.shapeTex=gl.createTexture();

    // period boundaries. Periodic scaffolds pass raw uvw to the sampler (no
    // fract()); non-periodic scaffolds clamp uvw to [0,1] in the shader so
    // REPEAT here is a no-op for them. Using CLAMP_TO_EDGE would flatten the
    // field in the half-voxel skin along each boundary plane and create a
    // discontinuity the ray marcher can't traverse cleanly.
    gl.texParameteri(gl.TEXTURE_3D,gl.TEXTURE_WRAP_S,gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_3D,gl.TEXTURE_WRAP_T,gl.REPEAT);

    '  else if(hit){pos=ro+rd*t;n=nrmField(pos);if(dot(n,-rd)<0.0)n=-n;}',
    '  else{if(implicit(ro+rd*tEx)<thresh){pos=ro+rd*tEx;n=boxNormal(pos);if(dot(n,-rd)<0.0)n=-n;t=tEx;}else{fragColor=vec4(bgCol,1.0);return;}}',
    '  float dy=dot(n,vec3(0.0,1.0,0.0)),dz=dot(n,vec3(0.0,0.0,1.0));float hue=dy*dy*0.33+dz*dz*0.67;',
    '  vec3 iridBase=palette(hue);vec3 iridShift=palette(hue+0.5);',
    '  vec3 l1=normalize(vec3(1.0,1.8,2.0)),l2=normalize(vec3(-0.8,-0.3,0.6));',
    '  float l3=max(dot(n,normalize(vec3(-0.5,-1.0,-1.5))),0.0)*0.3;',
    '  float diff=0.35+max(dot(n,l1),0.0)*0.7+max(dot(n,l2),0.0)*0.25+l3;',
    '  float spec1=pow(max(dot(reflect(-l1,n),-rd),0.0),120.0)*0.7;',
    '  float spec2=pow(max(dot(reflect(-l1,n),-rd),0.0),20.0)*0.2;',
    '  float rim=pow(1.0-max(dot(n,-rd),0.0),2.5)*0.8;',
    '  vec3 green=vec3(0.784,0.961,0.259);',
    '  vec3 col=iridBase*diff+vec3(1.0)*spec1+green*spec2*0.6+green*rim*0.45;',
    '  col=mix(bgCol,col,exp(-(t-tEn)*(0.075/uViewH)));',
    '  fragColor=vec4(clamp(col,0.0,1.0),1.0);}',
  ].join('\n');
};
MeshRaymarcher.prototype._mkShader=function(type,src){
  var gl=this.gl,s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    console.error('Shader error:',gl.getShaderInfoLog(s));return null;
  }
  return s;
};
MeshRaymarcher.prototype._submitShader=function(){
  var gl=this.gl;
  var vs='#version 300 es\nin vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}';
  var fs=this._buildShader();
  var vs_=this._mkShader(gl.VERTEX_SHADER,vs);
  var fs_=this._mkShader(gl.FRAGMENT_SHADER,fs);
  if(!vs_||!fs_)return;
  var prg=gl.createProgram();
  gl.attachShader(prg,vs_);gl.attachShader(prg,fs_);gl.linkProgram(prg);
  gl.deleteShader(vs_);gl.deleteShader(fs_);

};
MeshRaymarcher.prototype._activateUniforms=function(){
  var gl=this.gl,p=this.prog;
  this._uRes=gl.getUniformLocation(p,'res');
  this._uRot=gl.getUniformLocation(p,'rot');
  this._uZoom=gl.getUniformLocation(p,'zoom');
  this._uField=gl.getUniformLocation(p,'uField');
  this._uFieldMin=gl.getUniformLocation(p,'uFieldMin');
  this._uFieldMax=gl.getUniformLocation(p,'uFieldMax');
  this._uLipschitz=gl.getUniformLocation(p,'uLipschitz');
  this._uShapeSDF=gl.getUniformLocation(p,'uShapeSDF');
  this._uBboxMin=gl.getUniformLocation(p,'uBboxMin');
  this._uBboxSize=gl.getUniformLocation(p,'uBboxSize');

  this._uCellSizeMm=gl.getUniformLocation(p,'uCellSizeMm');
  this._uHasShape=gl.getUniformLocation(p,'uHasShape');
  this._uViewH=gl.getUniformLocation(p,'uViewH');
  this._uNrmStep=gl.getUniformLocation(p,'uNrmStep');
  this._uIsPeriodic=gl.getUniformLocation(p,'uIsPeriodic');
  this._uWorldMin=gl.getUniformLocation(p,'uWorldMin');
  this._uWorldSize=gl.getUniformLocation(p,'uWorldSize');
  this._uBakeRaw=gl.getUniformLocation(p,'uBakeRaw');
  this._uFieldMid=gl.getUniformLocation(p,'uFieldMid');
  this._uFieldHalfR=gl.getUniformLocation(p,'uFieldHalfR');
  this._uCenter=gl.getUniformLocation(p,'uCenter');
  this._uHalfW=gl.getUniformLocation(p,'uHalfW');
  this._uTopoMode=gl.getUniformLocation(p,'uTopoMode');
  this._uHalfInvert=gl.getUniformLocation(p,'uHalfInvert');
  this._pLoc=gl.getAttribLocation(p,'p');
  this._dirty=true;
};
MeshRaymarcher.prototype.render=function(){
  var gl=this.gl;if(!gl)return;
  // Async compile check
  if(this._compiling&&this._pendingProg){
    var ready=!this._khr||gl.getProgramParameter(this._pendingProg,this._khr.COMPLETION_STATUS_KHR);
    if(ready){
      if(gl.getProgramParameter(this._pendingProg,gl.LINK_STATUS)){
        if(this.prog)gl.deleteProgram(this.prog);
        this.prog=this._pendingProg;
        this._activateUniforms();
      }else{console.error('Link error:',gl.getProgramInfoLog(this._pendingProg));gl.deleteProgram(this._pendingProg);}
      this._pendingProg=null;this._compiling=false;
    }
  }
  if(!this.prog||!this.fieldTex||!this._dirty)return;
  this._dirty=false;
  // Resize canvas
  var area=document.getElementById('previewArea');
  var dpr=Math.min(window.devicePixelRatio||1,1.5);
  var w=Math.round((area?area.clientWidth:400)*dpr);
  var h=Math.round((area?area.clientHeight:300)*dpr);
  if(this.canvas.width!==w||this.canvas.height!==h){this.canvas.width=w;this.canvas.height=h;}
  gl.viewport(0,0,w,h);
  gl.useProgram(this.prog);
  gl.uniform2f(this._uRes,w,h);
  gl.uniformMatrix3fv(this._uRot,false,new Float32Array(this.rotMat));
  gl.uniform1f(this._uZoom,this.camZoom);
  gl.uniform1f(this._uFieldMin,this.fieldMin);
  gl.uniform1f(this._uFieldMax,this.fieldMax);
  var wn=this.worldMin,wx=this.worldMax;
  gl.uniform1f(this._uViewH,this.viewH);
  // nrmStep = half voxel size in world units — matches local surface scale, not global field gradient
  var voxelSize=(wx[0]-wn[0])/Math.max(this.bakeN,1);
  gl.uniform1f(this._uNrmStep,Math.max(voxelSize,0.01));
  // Shape SDF Lipschitz in world units = 10/cellSizeMm (from d_mm*(10/cellSizeMm) scaling).
  // Using 1.0 causes 5× overshoot at 2mm cells, jumping past boundaries into phantom hits.
  var shapeLip=(this.hasShape&&this.shapeData)?(10.0/this.shapeData.cellSizeMm):0.0;
  gl.uniform1f(this._uLipschitz,Math.max(this.lipschitz,shapeLip));
  gl.uniform1f(this._uIsPeriodic,this.isPeriodic?1.0:0.0);
  gl.uniform3f(this._uWorldMin,wn[0],wn[1],wn[2]);
  gl.uniform3f(this._uWorldSize,wx[0]-wn[0],wx[1]-wn[1],wx[2]-wn[2]);
  var topo=this.topology||{};
  gl.uniform1f(this._uBakeRaw,topo.bakeRaw?1.0:0.0);
  var fmid=(this.fieldMin+this.fieldMax)*0.5;
  var fhr=Math.max((this.fieldMax-this.fieldMin)*0.5,0.001);
  gl.uniform1f(this._uFieldMid,fmid);gl.uniform1f(this._uFieldHalfR,fhr);
  gl.uniform1f(this._uCenter,topo.center!=null?topo.center:0.0);
  gl.uniform1f(this._uHalfW,topo.halfW!=null?topo.halfW:0.15);
  var tm=topo.topoMode||'sheet';
  gl.uniform1f(this._uTopoMode,tm==='half'?1.0:tm==='solid'?2.0:0.0);
  gl.uniform1f(this._uHalfInvert,topo.halfInvert?1.0:0.0);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_3D,this.fieldTex);gl.uniform1i(this._uField,0);
  gl.uniform1f(this._uHasShape,this.hasShape&&this.shapeTex?1.0:0.0);
  if(this.hasShape&&this.shapeTex&&this.shapeData){
    var sd=this.shapeData;
    gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_3D,this.shapeTex);gl.uniform1i(this._uShapeSDF,1);
    gl.uniform3f(this._uBboxMin,sd.bboxMin[0],sd.bboxMin[1],sd.bboxMin[2]);
    gl.uniform3f(this._uBboxSize,sd.bboxSize[0],sd.bboxSize[1],sd.bboxSize[2]);
    gl.uniform1f(this._uCellSizeMm,sd.cellSizeMm);
  }
  gl.bindBuffer(gl.ARRAY_BUFFER,this.quadBuf);
  gl.enableVertexAttribArray(this._pLoc);
  gl.vertexAttribPointer(this._pLoc,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
};
MeshRaymarcher.prototype._startLoop=function(){
  var self=this;
  self._loopRunning=true;
  var lastTs=0;
  function loop(ts){
    var dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
    if(self._dirty||self._compiling){
      self.rotMat=self._orthonorm(self.rotMat);
      self.render();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  new ResizeObserver(function(){self._dirty=true;}).observe(document.getElementById('previewArea'));
};
MeshRaymarcher.prototype._rotAA=function(ax,ay,az,angle){var c=Math.cos(angle),s=Math.sin(angle),t2=1-c;var l=Math.sqrt(ax*ax+ay*ay+az*az)||1;ax/=l;ay/=l;az/=l;return[t2*ax*ax+c,t2*ax*ay+s*az,t2*ax*az-s*ay,t2*ax*ay-s*az,t2*ay*ay+c,t2*ay*az+s*ax,t2*ax*az+s*ay,t2*ay*az-s*ax,t2*az*az+c];};
MeshRaymarcher.prototype._mat3Mul=function(A,B){var r=new Array(9);for(var c=0;c<3;c++)for(var row=0;row<3;row++)r[c*3+row]=A[0*3+row]*B[c*3+0]+A[1*3+row]*B[c*3+1]+A[2*3+row]*B[c*3+2];return r;};
MeshRaymarcher.prototype._orthonorm=function(m){function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}function scl(a,s){return[a[0]*s,a[1]*s,a[2]*s];}function sub(a,b){return[a[0]-b[0],a[1]-b[1],a[2]-b[2]];}function nrm(a){var l=Math.sqrt(dot(a,a))||1;return[a[0]/l,a[1]/l,a[2]/l];}var x=[m[0],m[1],m[2]],y=[m[3],m[4],m[5]],z=[m[6],m[7],m[8]];x=nrm(x);y=nrm(sub(y,scl(x,dot(y,x))));z=nrm(sub(sub(z,scl(x,dot(z,x))),scl(y,dot(z,y))));return[x[0],x[1],x[2],y[0],y[1],y[2],z[0],z[1],z[2]];};
MeshRaymarcher.prototype._applyDelta=function(dx,dy){if(Math.abs(dx)>0.001){var ux=this.rotMat[3],uy=this.rotMat[4],uz=this.rotMat[5];this.rotMat=this._mat3Mul(this._rotAA(ux,uy,uz,-dx*0.007),this.rotMat);this._dirty=true;}if(Math.abs(dy)>0.001){var rx=this.rotMat[0],ry=this.rotMat[1],rz=this.rotMat[2];this.rotMat=this._mat3Mul(this._rotAA(rx,ry,rz,-dy*0.007),this.rotMat);this._dirty=true;}};
MeshRaymarcher.prototype._setupInteraction=function(){
  var self=this,drag=false,lx=0,ly=0;
  this.canvas.onmousedown=function(e){drag=true;lx=e.clientX;ly=e.clientY;self.autoRot=false;};
  window.addEventListener('mouseup',function(){drag=false;});
  window.addEventListener('mousemove',function(e){if(drag){self._applyDelta(e.clientX-lx,e.clientY-ly);lx=e.clientX;ly=e.clientY;}});
  this.canvas.addEventListener('touchstart',function(e){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;self.autoRot=false;e.preventDefault();},{passive:false});
  window.addEventListener('touchend',function(){drag=false;});
  window.addEventListener('touchmove',function(e){if(drag){self._applyDelta(e.touches[0].clientX-lx,e.touches[0].clientY-ly);lx=e.touches[0].clientX;ly=e.touches[0].clientY;e.preventDefault();}},{passive:false});
  this.canvas.addEventListener('wheel',function(e){var maxZ=Math.max(80,self.viewH*8);self.camZoom=Math.max(self.viewH*0.3,Math.min(maxZ,self.camZoom+e.deltaY*0.04));self._dirty=true;e.preventDefault();},{passive:false});
};
// Instantiate global raymarcher
const rm = new MeshRaymarcher(document.getElementById('rmCanvas'));



// ── Lazy-load occt-import-js (only when STEP/IGES dropped) ───────────────
async function getOCCT(){
  if(occtModule) return occtModule;
  await new Promise((res, rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/occt-import-js@0.0.23/dist/occt-import-js.js';
    s.onload=res; s.onerror=()=>rej(new Error('Failed to load occt-import-js'));
    document.head.appendChild(s);
  });
  // Global is 'occtimportjs' (lowercase) per official docs — not OcctImportJs
  if(typeof window.occtimportjs !== 'function')
    throw new Error('occt-import-js loaded but occtimportjs() not found — check CDN version');
  occtModule = await window.occtimportjs();
  return occtModule;
}

// ── Extract flat position + index arrays from any Three.js geometry ───────
function geometryToArrays(geo){
  if(!geo.attributes.position) return null;
  // STL (and some OBJ) files have unwelded vertices — every triangle owns 3 unique
  // verts with no sharing. Manifold requires welded topology or it throws ManifoldError.
  // mergeVertices() welds coincident vertices and produces a proper indexed geometry.
  const welded = mergeVertices(geo, 1e-6); // 1 micron tolerance
  console.log(`[F13LD.mesh] mergeVertices: ${geo.attributes.position.count} → ${welded.attributes.position.count} verts`);
  const pos = Array.from(welded.attributes.position.array);
  const idx = welded.index ? Array.from(welded.index.array)
    : Array.from({length: pos.length/3}, (_,i) => i);
  return {pos, idx};
}

function mergeArrays(list){
  const allPos=[], allIdx=[];
  let offset=0;
  for(const {pos,idx} of list){
    allPos.push(...pos);
    allIdx.push(...idx.map(i=>i+offset));
    offset += pos.length/3;
  }
  return {pos:allPos, idx:allIdx};
}

function groupToArrays(obj){
  const list=[];
  obj.traverse(child=>{
    if(child.isMesh && child.geometry){
      const r=geometryToArrays(child.geometry);
      if(r) list.push(r);
    }
  });
  return mergeArrays(list);
}

// ── Compute shape bounding box (mm). Returns bbox + a display-only normaliser ──
function computeShapeBbox(pos){
  let mnx=Infinity,mny=Infinity,mnz=Infinity,mxx=-Infinity,mxy=-Infinity,mxz=-Infinity;
  for(let i=0;i<pos.length;i+=3){
    if(pos[i]<mnx)mnx=pos[i]; if(pos[i]>mxx)mxx=pos[i];
    if(pos[i+1]<mny)mny=pos[i+1]; if(pos[i+1]>mxy)mxy=pos[i+1];
    if(pos[i+2]<mnz)mnz=pos[i+2]; if(pos[i+2]>mxz)mxz=pos[i+2];
  }
  const cx=(mnx+mxx)/2, cy=(mny+mxy)/2, cz=(mnz+mxz)/2;
  const dx=mxx-mnx, dy=mxy-mny, dz=mxz-mnz;
  const maxDim=Math.max(dx,dy,dz,0.001);
  // displayNorm is used ONLY to fit the shape into Three.js [-5,5] view — never for Manifold
  const displayNorm={cx,cy,cz,scale:10/maxDim};
  const bboxStr=`${dx.toFixed(1)}×${dy.toFixed(1)}×${dz.toFixed(1)} mm`;
  return {mnx,mny,mnz,mxx,mxy,mxz,cx,cy,cz,dx,dy,dz,maxDim,bboxStr,displayNorm};
}

// ── Build Manifold from raw mm positions ─────────────────────────────────
async function buildShapeManifold(pos, idx){
  await manifoldReady;
  if(!ManifoldAPI) throw new Error('Manifold not ready');
  const vertProperties = pos instanceof Float32Array ? pos : new Float32Array(pos);
  const triVerts = new Uint32Array(idx);
  console.log('[F13LD.mesh] buildShapeManifold:', vertProperties.length/3, 'verts,', triVerts.length/3, 'tris');
  console.log('[F13LD.mesh] ManifoldAPI.Mesh available:', typeof ManifoldAPI.Mesh);

  // Manifold requires mergeFromVert/mergeToVert to understand mesh topology when
  // vertices are duplicated (as in STL/graphics-library meshes). The correct pattern
  // per Manifold docs: construct a WASM Mesh object, call .merge() to auto-fill
  // the merge vectors from geometry, then pass to the Manifold constructor.
  let mfld;
  try{
    const wasmMesh = new ManifoldAPI.Mesh({ numProp: 3, vertProperties, triVerts });
    console.log('[F13LD.mesh] ManifoldAPI.Mesh constructed OK, calling .merge()...');
    wasmMesh.merge();
    console.log('[F13LD.mesh] .merge() complete, constructing Manifold...');
    mfld = new ManifoldAPI.Manifold(wasmMesh);
    console.log('[F13LD.mesh] Manifold constructed OK, isEmpty:', mfld.isEmpty());
  }catch(e){
    console.error('[F13LD.mesh] Mesh/merge/Manifold construction failed:', e);
    throw new Error('Manifold construction failed -- see console for details.');
  }
  if(mfld.isEmpty()) throw new Error('Manifold reports empty -- mesh may have unresolvable topology errors.');
  return mfld;
}
// ── Main shape file dispatcher ────────────────────────────────────────────
async function handleShapeFile(file){
  const name=file.name, ext=name.split('.').pop().toLowerCase();
  setShapeUI('loading', name);
  clearShapeWire();
  if(importedShape){try{importedShape.manifold.delete();}catch(_){} importedShape=null;}
  if(rm) rm.clearShape();
  showComputing('loading shape…','parsing file');
  try{
    let pos, idx, format;
    if(ext==='stl'){
      format='STL';
      const buf=await file.arrayBuffer();
      const geo = new STLLoader().parse(buf);
      ({pos,idx}=geometryToArrays(geo));
    } else if(ext==='obj'){
      format='OBJ';
      const text=await file.text();
      const group=new OBJLoader().parse(text);
      ({pos,idx}=groupToArrays(group));
    } else if(ext==='3mf'){
      format='3MF';
      const buf=await file.arrayBuffer();
      // ⚠ API UNCERTAIN: ThreeMFLoader may not have parseAsync — if this throws,
      // it may be .parse(buf) only; check console
      console.log('[F13LD.mesh] ThreeMFLoader: calling parseAsync…');
      let group;
      try{
        group=await new ThreeMFLoader().parseAsync(buf);
      }catch(e){
        console.warn('[F13LD.mesh] parseAsync failed, trying sync parse:', e);
        group=new ThreeMFLoader().parse(buf);
      }
      ({pos,idx}=groupToArrays(group));
    } else if(['step','stp'].includes(ext)){
      format='STEP';
      ({pos,idx}=await loadCADFormat(file,'step'));
    } else if(['iges','igs'].includes(ext)){
      format='IGES';
      ({pos,idx}=await loadCADFormat(file,'iges'));
    } else {
      throw new Error('Unsupported format: .'+ext);
    }
    if(!pos||pos.length===0) throw new Error('No geometry found in file.');
    const posArr = new Float32Array(pos);
    const idxArr = new Uint32Array(idx);
    const tris=Math.floor(idxArr.length/3);
    // Center the shape on world origin. STEP/IGES files preserve the CAD
    // assembly position (could be far from origin); STL/OBJ files vary by
    // authoring tool. The preview camera is origin-centered with a view box
    // sized from bbox.maxDim, so any offset leaves the shape partially or
    // fully out of view. Translate once here → Manifold, BVH, SDF bake,
    // shader, and aperiodic world bounds all operate in one consistent
    // coordinate system with no special-casing anywhere downstream.
    // importCenter is restored to exported mesh vertices so the 3MF lands
    // at the user's original CAD coordinates (lines up when reimported).
    const preBbox = computeShapeBbox(posArr);
    const importCenter = {x: preBbox.cx, y: preBbox.cy, z: preBbox.cz};
    for(let i=0; i<posArr.length; i+=3){
      posArr[i]   -= importCenter.x;
      posArr[i+1] -= importCenter.y;
      posArr[i+2] -= importCenter.z;
    }
    const bbox=computeShapeBbox(posArr); // now centered on origin
    setShapeUI('loading', name, null, 'building shape SDF…');
    showComputing('loading shape…','building shape SDF…');
    const [manifold, sdfGrid] = await Promise.all([
      buildShapeManifold(posArr, idxArr),
      computeShapeSDF(posArr, idxArr, bbox)
    ]);
    const suggestedCell=Math.max(0.5, parseFloat((bbox.maxDim/5).toFixed(1)));
    importedShape={manifold, posArr, idxArr, bbox, sdfGrid, importCenter, meta:{name,format,tris,bbox:bbox.bboxStr}};
    const cellSizeMm=parseFloat(document.getElementById('shapeCellSizeMm')?.value)||3;
    if(rm){rm.setShapeSDF(sdfGrid, bbox, cellSizeMm);rm._dirty=true;}
    // suggestedCell is computed but NOT passed to setShapeUI — user's current
    // cell size is preserved across shape loads. Same for render quality:
    // use rm._quality (last quality the user selected) instead of hardcoded
    // 'draft', so a new shape re-bakes at the user's chosen quality and the
    // quality-button UI stays in sync.
    void suggestedCell;
    setShapeUI('ok', name, {format,tris,bbox:bbox.bboxStr}, null);
    updateExportEstimate();
    if(currentRecipe) triggerPreview(rm&&rm._quality||'draft');
    else hideComputing();
  } catch(e){
    importedShape=null;
    setShapeUI('err', name, null, e.message||String(e));
    hideComputing();
    console.error(e);
  }
}

async function loadCADFormat(file, type){
  const occt=await getOCCT();
  const buf=await file.arrayBuffer();
  const bytes=new Uint8Array(buf);
  // Result schema (Three.js-compatible per official docs):
  //   result.meshes[i].attributes.position.array — flat vertex positions
  //   result.meshes[i].index.array               — flat triangle indices
  const result=type==='step' ? occt.ReadStepFile(bytes) : occt.ReadIgesFile(bytes);
  console.log('[OCCT] success:',result.success,'meshes:',result.meshes?.length,'keys:',Object.keys(result));
  if(!result.success) throw new Error('OCCT could not parse '+type.toUpperCase()+' file.');
  const allPos=[], allIdx=[];
  let offset=0;
  for(const mesh of result.meshes||[]){
    const pos=mesh.attributes?.position?.array;
    const idx=mesh.index?.array;
    if(!pos||!idx){console.warn('[OCCT] mesh missing position/index, keys:',Object.keys(mesh));continue;}
    for(let i=0;i<pos.length;i++) allPos.push(pos[i]);
    for(let i=0;i<idx.length;i++) allIdx.push(idx[i]+offset);
    offset+=pos.length/3;
  }
  return {pos:allPos, idx:allIdx};
}

// ── Shape strip UI state renderer ─────────────────────────────────────────
function setShapeUI(state, name, meta, errMsg, suggestedCell){
  const dz=document.getElementById('shapeDZ');
  const card=document.getElementById('shapeCard');
  if(state==='loading'){

  // show/hide cell size overlay
  const cellOv=document.getElementById('cellOverlay');

  x=x*2*Math.PI-Math.PI;y=y*2*Math.PI-Math.PI;z=z*2*Math.PI-Math.PI;
  var s=0;
  for(var i=0;i<kernels.length;i++){var k=kernels[i],dx=x-k.px,dy=y-k.py,dz=z-k.pz;var dt=dx*k.tx+dy*k.ty+dz*k.tz,dn1=dx*k.n1x+dy*k.n1y+dz*k.n1z,dn2=dx*k.n2x+dy*k.n2y+dz*k.n2z;s+=Math.exp(-(dt*dt)/(k.a*k.a)-(dn1*dn1+dn2*dn2)/(k.b*k.b));}
  return s-.3;
}
function evalField(waves,x,y,z,kernels){
  if(kernels)return evalHUField(kernels,x,y,z);
  var s=0,N=waves.length;for(var i=0;i<N;i++)s+=Math.cos(waves[i].kx*x+waves[i].ky*y+waves[i].kz*z+waves[i].phase);return s/Math.sqrt(N);

// ── Gray-Scott reaction-diffusion ────────────────────────────────────────
function buildGrayScott(params, N) {
  var rng = mulberry32(params.rngSeed||42);
  var F = params.rdF||0.030, k = params.rdK||0.057;
  var Du = params.rdDu||0.14, Dv = Du*0.5;
  var dt = Math.min(1.0, 0.9/(6.0*Du));
  var steps = params.rdSteps||3000;
  var u = new Float32Array(N*N*N), v = new Float32Array(N*N*N);
  for (var i = 0; i < N*N*N; i++) u[i] = 1.0 + (rng()-0.5)*0.02;
  var nS = Math.max(3, Math.floor(N*N/20));
  for (var s = 0; s < nS; s++) {
    var cx=Math.floor(rng()*(N-4))+2, cy=Math.floor(rng()*(N-4))+2, cz=Math.floor(rng()*(N-4))+2;
    for (var dz=-1;dz<=1;dz++) for (var dy=-1;dy<=1;dy++) for (var dx=-1;dx<=1;dx++) {
      var ix=(cx+dx+N)%N, iy=(cy+dy+N)%N, iz=(cz+dz+N)%N, id=ix+iy*N+iz*N*N;
      u[id]=0.5+(rng()-0.5)*0.1; v[id]=0.25+(rng()-0.5)*0.05;
    }
  }
  var u2 = new Float32Array(N*N*N), v2 = new Float32Array(N*N*N), tmp;
  for (var step = 0; step < steps; step++) {
    for (var iz=0;iz<N;iz++) { var izm=(iz-1+N)%N, izp=(iz+1)%N;
      for (var iy=0;iy<N;iy++) { var iym=(iy-1+N)%N, iyp=(iy+1)%N;
        for (var ix=0;ix<N;ix++) { var ixm=(ix-1+N)%N, ixp=(ix+1)%N;
          var idx=ix+iy*N+iz*N*N, uc=u[idx], vc=v[idx];
          var lu=u[ixp+iy*N+iz*N*N]+u[ixm+iy*N+iz*N*N]+u[ix+iyp*N+iz*N*N]+u[ix+iym*N+iz*N*N]+u[ix+iy*N+izp*N*N]+u[ix+iy*N+izm*N*N]-6.0*uc;
          var lv=v[ixp+iy*N+iz*N*N]+v[ixm+iy*N+iz*N*N]+v[ix+iyp*N+iz*N*N]+v[ix+iym*N+iz*N*N]+v[ix+iy*N+izp*N*N]+v[ix+iy*N+izm*N*N]-6.0*vc;
          var uv2=uc*vc*vc, nu=uc+dt*(Du*lu-uv2+F*(1.0-uc)), nv=vc+dt*(Dv*lv+uv2-(F+k)*vc);
          u2[idx]=nu<0?0:nu>1?1:nu; v2[idx]=nv<0?0:nv>1?1:nv;
        }
      }
    }
    tmp=u; u=u2; u2=tmp; tmp=v; v=v2; v2=tmp;
  }
  return u;
}
function evalRDField(grid, N, u, v, w) {
  // u,v,w already in [0,1] (post-tile fract applied by caller)
  var fx=u*(N-1), fy=v*(N-1), fz=w*(N-1);
  var x0=Math.floor(fx), y0=Math.floor(fy), z0=Math.floor(fz);
  var x1=(x0+1)%N, y1=(y0+1)%N, z1=(z0+1)%N;
  var dx=fx-x0, dy=fy-y0, dz=fz-z0;
  return grid[x0+y0*N+z0*N*N]*(1-dx)*(1-dy)*(1-dz)
        +grid[x1+y0*N+z0*N*N]*dx*(1-dy)*(1-dz)
        +grid[x0+y1*N+z0*N*N]*(1-dx)*dy*(1-dz)
        +grid[x1+y1*N+z0*N*N]*dx*dy*(1-dz)
        +grid[x0+y0*N+z1*N*N]*(1-dx)*(1-dy)*dz
        +grid[x1+y0*N+z1*N*N]*dx*(1-dy)*dz
        +grid[x0+y1*N+z1*N*N]*(1-dx)*dy*dz
        +grid[x1+y1*N+z1*N*N]*dx*dy*dz;
}

// ── SDF closures — all return positive-inside (Manifold convention) ───────

function evalNoiseRaw(surf,nx,ny,nz){
  const t=surf.noise_type||'simplex',o=surf.octaves||4,l=surf.lacunarity||2,g=surf.gain||.5;
  if(t==='simplex') return Noise.snoise(nx,ny,nz);
  if(t==='cellular')return Noise.cellular(nx,ny,nz,surf.distance_metric||'euclidean');
  if(t==='fbm')     return Noise.fbm(nx,ny,nz,o,l,g);
  if(t==='ridged')  return Noise.ridged(nx,ny,nz,o,l,g);
  if(t==='billow')  return Noise.billow(nx,ny,nz,o,l,g);
  if(t==='curl')    return Noise.curl(nx,ny,nz,surf.curl_step||.1,surf.potential_scale||1);
  return Noise.warp(nx,ny,nz,surf.warp_strength||1,o,l,g);
}

function buildNoiseSDF(json){
  const surf=json.surface,geom=json.geometry||{};
  const freq=surf.frequency||.3,sx=surf.scale_x??1,sy=surf.scale_y??1,sz=surf.scale_z??1;
  const PP=16,SCALE=5.0/Math.PI;let mn=Infinity,mx=-Infinity;
  for(let zi=0;zi<PP;zi++)for(let yi=0;yi<PP;yi++)for(let xi=0;xi<PP;xi++){
    const px=((xi/(PP-1))*2-1)*Math.PI;
    const py=((yi/(PP-1))*2-1)*Math.PI;
    const pz=((zi/(PP-1))*2-1)*Math.PI;
    const raw=evalNoiseRaw(surf,px*SCALE*freq*sx,py*SCALE*freq*sy,pz*SCALE*freq*sz);
    if(raw<mn)mn=raw;if(raw>mx)mx=raw;
  }
  const range=mx-mn,noiseMin=mn-range*.05,noiseMax=mx+range*.05;
  const mid=(noiseMin+noiseMax)*.5,halfR=Math.max((noiseMax-noiseMin)*.5,.001);
  const center=surf.center??0,halfW=surf.half_width??.15,mode=geom.mode||'shell';
  const SCALE2=5.0/Math.PI;
  return p=>{
    // World space is [-5,5]; noise tool uses [-pi,pi]*SCALE — match exactly
    const raw=evalNoiseRaw(surf,p[0]*SCALE2*freq*sx,p[1]*SCALE2*freq*sy,p[2]*SCALE2*freq*sz);
    const norm=(raw-mid)/halfR;
    if(mode==='half')   return (geom.half_invert?center-norm:norm-center); // flip side support
    if(mode==='solid')  return Math.abs(norm-center)-halfW; // inverted slab
    return halfW-Math.abs(norm-center);                  // sheet (default)
  };
}

// Raw preset field functions — verbatim from TPMS builder _fn definitions
const RAW_PRESETS={
  splitP:       (x,y,z)=>Math.sin(x)*Math.sin(y)*Math.cos(z)+Math.sin(y)*Math.sin(z)*Math.cos(x)+Math.sin(z)*Math.sin(x)*Math.cos(y)-0.3,
  frd:          (x,y,z)=>Math.sin(2*x)*Math.cos(y)*Math.sin(z)+Math.sin(x)*Math.sin(2*y)*Math.cos(z)+Math.cos(x)*Math.sin(y)*Math.sin(2*z)-Math.cos(2*x)*Math.cos(2*y)-Math.cos(2*y)*Math.cos(2*z)-Math.cos(2*z)*Math.cos(2*x)+0.3,
  fks:          (x,y,z)=>Math.cos(2*x)*Math.sin(y)*Math.cos(z)+Math.cos(2*y)*Math.sin(z)*Math.cos(x)+Math.cos(2*z)*Math.sin(x)*Math.cos(y),
  gyroidHarmonic:(x,y,z)=>Math.sin(x)*Math.cos(y)+Math.sin(y)*Math.cos(z)+Math.sin(z)*Math.cos(x)+0.3*(Math.sin(2*x)*Math.cos(2*y)+Math.sin(2*y)*Math.cos(2*z)+Math.sin(2*z)*Math.cos(2*x)),
  primitiveC:   (x,y,z)=>2.0*(Math.cos(x)+Math.cos(y)+Math.cos(z))-(Math.cos(2*x)+Math.cos(2*y)+Math.cos(2*z)),
  octo:         (x,y,z)=>Math.cos(x)+Math.cos(y)+Math.cos(z)-0.5*(Math.cos(2*x)*Math.cos(2*y)+Math.cos(2*y)*Math.cos(2*z)+Math.cos(2*z)*Math.cos(2*x)),
  pHarmonic:    (x,y,z)=>Math.cos(x)+Math.cos(y)+Math.cos(z)+0.25*(Math.cos(2*x)+Math.cos(2*y)+Math.cos(2*z)),
  lidinoid:     (x,y,z)=>1.1*(Math.sin(2*x)*Math.cos(y)*Math.sin(z)+Math.sin(x)*Math.sin(2*y)*Math.cos(z)+Math.cos(x)*Math.sin(y)*Math.sin(2*z))-0.2*(Math.cos(2*x)*Math.cos(2*y)+Math.cos(2*y)*Math.cos(2*z)+Math.cos(2*z)*Math.cos(2*x))-0.4*(Math.cos(2*x)+Math.cos(2*y)+Math.cos(2*z)),
};

function buildTPMSSDF(json){
  const s=json.surface,g=json.geometry||{};
  const cellScale=g.cell_scale||1,freqScale=(Math.PI*cellScale)/5.0;
  const ps=g.phase_shift||{x:0,y:0,z:0},mode=g.mode||'shell';
  const TP=2*Math.PI;

  // Gradient — matches TPMS shader: gF=mix(lo,hi,t01) where t01=(p+H)/(2H)
  // In world [-5,5]: t01=clamp(p/10+0.5,0,1); for PI mode gradient scales phase offset.
  const gradOn=!!(g.gradient&&g.gradient.enabled);
  const gxLo=gradOn?(g.gradient.x?.lo??1):1,gxHi=gradOn?(g.gradient.x?.hi??1):1;
  const gyLo=gradOn?(g.gradient.y?.lo??1):1,gyHi=gradOn?(g.gradient.y?.hi??1):1;
  const gzLo=gradOn?(g.gradient.z?.lo??1):1,gzHi=gradOn?(g.gradient.z?.hi??1):1;

  // Raw preset path — use the precomputed _fn directly
  const rawFn = (s.type==='raw_preset') ? (RAW_PRESETS[s.preset]||null) : null;
  if(s.type==='raw_preset'&&!rawFn)
    throw new Error('Unknown raw preset: '+s.preset+'. Supported: '+Object.keys(RAW_PRESETS).join(', '));

  // Term-tree path
  const terms=s.terms||[];
  function evalFactor(factor,tx,ty,tz){
    const t=factor.trig;
    let val=t.includes('(x)')?tx*(factor.fx||1):t.includes('(y)')?ty*(factor.fy||1):t.includes('(z)')?tz*(factor.fz||1):0;
    if(t.startsWith('sin'))return Math.sin(val);
    if(t.startsWith('cos'))return Math.cos(val);
    return 1;
  }
  function evalTerms(tx,ty,tz){
    let sum=0;
    for(const term of terms){if(!term.on)continue;let prod=term.coef??1;for(const f of term.factors)prod*=evalFactor(f,tx,ty,tz);sum+=prod;}
    return sum;
  }

  function evalPhi(tx,ty,tz){
    return rawFn ? rawFn(tx,ty,tz) : evalTerms(tx,ty,tz);
  }

  return p=>{
    const tx=p[0]*freqScale,ty=p[1]*freqScale,tz=p[2]*freqScale;
    if(gradOn){
      const t01x=Math.max(0,Math.min(1,p[0]/10+0.5));
      const t01y=Math.max(0,Math.min(1,p[1]/10+0.5));
      const t01z=Math.max(0,Math.min(1,p[2]/10+0.5));
      const gxF=gxLo+(gxHi-gxLo)*t01x;
      const gyF=gyLo+(gyHi-gyLo)*t01y;
      const gzF=gzLo+(gzHi-gzLo)*t01z;
      if(mode==='pi-tpms'){
        const phiA=evalPhi(tx,ty,tz);
        const phiB=evalPhi(tx+(ps.x||0)*TP*gxF,ty+(ps.y||0)*TP*gyF,tz+(ps.z||0)*TP*gzF);
        return (g.pipe_radius||.18)-Math.max(Math.abs(phiA),Math.abs(phiB));
      }
      const phiA=evalPhi(tx*gxF,ty*gyF,tz*gzF);
      if(mode==='solid') return (g.offset||0)-phiA;
      return (g.wall_thickness||.3)-Math.abs(phiA-(g.offset||0));
    }
    const phiA=evalPhi(tx,ty,tz);
    if(mode==='pi-tpms'){
      const phiB=evalPhi(tx+(ps.x||0)*TP,ty+(ps.y||0)*TP,tz+(ps.z||0)*TP);
      return (g.pipe_radius||.18)-Math.max(Math.abs(phiA),Math.abs(phiB));
    }
    if(mode==='solid') return (g.offset||0)-phiA;
    return (g.wall_thickness||.3)-Math.abs(phiA-(g.offset||0));
  };
}
// ── HU domain-spanning helpers (shape mode) ──────────────────────────────────
function buildHUKernelsMM(params,bbox,cellSizeMm){
  var rng=mulberry32(params.rngSeed);
  var ddx=bbox.mxx-bbox.mnx,ddy=bbox.mxy-bbox.mny,ddz=bbox.mxz-bbox.mnz;
  var volRatio=(ddx*ddy*ddz)/Math.pow(cellSizeMm,3);
  var N=Math.min(Math.ceil((params.huN||80)*Math.cbrt(volRatio)),300);
  var aspect=params.huAspect||4,bw=params.huWidth||0.04;
  var a=bw*aspect*0.5*cellSizeMm,b=bw*0.5*cellSizeMm;
  var kappa=params.kappa||6,mode=params.dirMode||'single';
  var tRad=(params.dirTheta||0)*Math.PI/180,pRad=(params.dirPhi||0)*Math.PI/180;
  var mux=Math.sin(tRad)*Math.cos(pRad),muy=Math.sin(tRad)*Math.sin(pRad),muz=Math.cos(tRad);
  var axes=[[1,0,0],[0,1,0],[0,0,1]],weights=[params.wX||.33,params.wY||.33,params.wZ||.34];
  var totalW=Math.max(weights[0]+weights[1]+weights[2],1e-6);
  function cross3(aa,bb){return[aa[1]*bb[2]-aa[2]*bb[1],aa[2]*bb[0]-aa[0]*bb[2],aa[0]*bb[1]-aa[1]*bb[0]];}
  function norm3(v){var l=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])||1;return[v[0]/l,v[1]/l,v[2]/l];}
  var pts=jitteredGrid3D(N,rng);
  var kernels=[];
  for(var i=0;i<N;i++){
    var t2;
    if(mode==='iso')t2=sampleVMF(rng,0);
    else if(mode==='single')t2=rotateTo(sampleVMF(rng,kappa),mux,muy,muz);
    else{var r=rng()*totalW,cum=0,ch=0;for(var ax=0;ax<3;ax++){cum+=weights[ax];if(r<=cum){ch=ax;break;}}t2=rotateTo(sampleVMF(rng,kappa),axes[ch][0],axes[ch][1],axes[ch][2]);}
    var arb=(Math.abs(t2[0])<.9)?[1,0,0]:[0,1,0];
    var n1=norm3(cross3(t2,arb)),n2=norm3(cross3(t2,n1));
    kernels.push({px:bbox.mnx+pts[i][0]*ddx,py:bbox.mny+pts[i][1]*ddy,pz:bbox.mnz+pts[i][2]*ddz,
      tx:t2[0],ty:t2[1],tz:t2[2],n1x:n1[0],n1y:n1[1],n1z:n1[2],n2x:n2[0],n2y:n2[1],n2z:n2[2],a:a,b:b});
  }
  return kernels;
}
function evalHUFieldMM(kernels,x,y,z){
  var s=0;
  for(var i=0;i<kernels.length;i++){
    var k=kernels[i],dx=x-k.px,dy=y-k.py,dz=z-k.pz;
    var dt=dx*k.tx+dy*k.ty+dz*k.tz,dn1=dx*k.n1x+dy*k.n1y+dz*k.n1z,dn2=dx*k.n2x+dy*k.n2y+dz*k.n2z;
    s+=Math.exp(-(dt*dt)/(k.a*k.a)-(dn1*dn1+dn2*dn2)/(k.b*k.b));
  }
  return s-0.3;
}
function bakeGridMM(evalFn,N,bbox){
  var ddx=bbox.mxx-bbox.mnx,ddy=bbox.mxy-bbox.mny,ddz=bbox.mxz-bbox.mnz;
  var grid=new Float32Array(N*N*N);
  for(var iz=0;iz<N;iz++)for(var iy=0;iy<N;iy++)for(var ix=0;ix<N;ix++){
    grid[ix+iy*N+iz*N*N]=evalFn(bbox.mnx+(ix+0.5)/N*ddx,bbox.mny+(iy+0.5)/N*ddy,bbox.mnz+(iz+0.5)/N*ddz);
  }
  return grid;
}

function buildGrainSDF(json,shapeCtx){
  const f=json.field,g=json.geometry||{};
  const center=g.center??0,halfW=g.half_width??.15,topo=g.topology||'sheet';

  // ── Reaction-diffusion ─────────────────────────────────────────────
  if(f.type==='reactiondiffusion'){
    const rdParams={rdF:f.rd_F||0.030,rdK:f.rd_k||0.057,rdDu:f.rd_Du||0.14,rdSteps:f.rd_steps||3000,rngSeed:f.rng_seed||42};
    const tile=f.rd_tile||1;
    let N_rd,getUVW;
    if(shapeCtx){
      // Shape mode: same 48³ simulation as cube preview.
      // Period = cellSizeMm so every tile in the domain matches the user's designed cell.
      // Seamless tiling is guaranteed by the periodic BCs used in buildGrayScott.
      const {cellSizeMm,bbox}=shapeCtx;
      N_rd=48;
      const frac=x=>x-Math.floor(x);
      getUVW=p=>{
        const mmx=p[0]*cellSizeMm/10,mmy=p[1]*cellSizeMm/10,mmz=p[2]*cellSizeMm/10;
        return[frac((mmx-bbox.mnx)/cellSizeMm*tile),frac((mmy-bbox.mny)/cellSizeMm*tile),frac((mmz-bbox.mnz)/cellSizeMm*tile)];
      };
    }else{
      // Cube preview: standard 48³ grid mapped to [-5,5] world space
      N_rd=48;
      const frac=x=>x-Math.floor(x);
      getUVW=p=>[frac((p[0]/10+0.5)*tile),frac((p[1]/10+0.5)*tile),frac((p[2]/10+0.5)*tile)];
    }
    const grid=buildGrayScott(rdParams,N_rd);
    return p=>{
      const[u,v,w]=getUVW(p);
      const raw=evalRDField(grid,N_rd,u,v,w);
      if(topo==='half') return g.half_invert?(center-raw):(raw-center);
      if(topo==='solid') return Math.abs(raw-center)-halfW;
      return halfW-Math.abs(raw-center);
    };
  }

  // ── Wave / kernel branch ──────────────────────────────────────────────
  let dirTheta=0,dirPhi=0;
  if(f.dir_mode==='single'&&f.principal_direction){
    const[mx,my,mz]=f.principal_direction;
    dirTheta=Math.acos(Math.max(-1,Math.min(1,mz)))*180/Math.PI;
    dirPhi=Math.atan2(my,mx)*180/Math.PI;
  }
  const params={fieldType:f.type,nWaves:f.n_waves||48,kappa:f.kappa||6,frequency:f.frequency||.27,rngSeed:f.rng_seed||42,dirMode:f.dir_mode||'single',dirTheta,dirPhi,wX:f.ortho_weights?.[0]??.33,wY:f.ortho_weights?.[1]??.33,wZ:f.ortho_weights?.[2]??.34,grfSigma:f.grf_sigma||.45,huN:f.hu_n||80,huAspect:f.hu_aspect||4,huWidth:f.hu_width||.04};
  const isHU=f.type==='hyperuniform';

  // ── HU shape mode: full-domain kernel field baked to a grid ───────────
  // Kernels are distributed throughout the bounding volume (not just one cell).
  // A pre-baked grid makes levelSet evaluation O(1) per sample after setup.
  if(isHU&&shapeCtx){
    const {cellSizeMm,bbox}=shapeCtx;
    const ddx=bbox.mxx-bbox.mnx,ddy=bbox.mxy-bbox.mny,ddz=bbox.mxz-bbox.mnz;
    const maxCells=Math.max(ddx,ddy,ddz)/cellSizeMm;
    const N_hu=Math.min(Math.ceil(32*maxCells),96);
    const mmKernels=buildHUKernelsMM(params,bbox,cellSizeMm);
    self.postMessage({type:'progress',stage:'pre-baking HU field ('+N_hu+'\u00b3 grid, '+mmKernels.length+' kernels)...'});
    const huGrid=bakeGridMM((x,y,z)=>evalHUFieldMM(mmKernels,x,y,z),N_hu,bbox);
    const c01=v=>v<0?0:v>1?1:v;
    return p=>{
      const u=c01((p[0]*cellSizeMm/10-bbox.mnx)/ddx);
      const v=c01((p[1]*cellSizeMm/10-bbox.mny)/ddy);
      const w=c01((p[2]*cellSizeMm/10-bbox.mnz)/ddz);
      const raw=evalRDField(huGrid,N_hu,u,v,w);
      if(topo==='half')  return g.half_invert?(center-raw):(raw-center);
      if(topo==='solid') return Math.abs(raw-center)-halfW;
      return halfW-Math.abs(raw-center);
    };
  }

  // ── Cube mode / wave+GRF (spinodoid/GRF extend to infinity naturally) ──
  const waves=isHU?null:(f.type==='gaussian'?buildGRFWaves(params):buildSpinodoidWaves(params));
  const kernels=isHU?buildHUKernels(params):null;
  const PI5=Math.PI/5;
  return p=>{
    let raw;
    if(isHU){
      raw=evalHUField(kernels,0.5+p[0]/10,0.5+p[1]/10,0.5+p[2]/10);
    }else{
      raw=evalField(waves,p[0]*PI5,p[1]*PI5,p[2]*PI5,null);
    }
    if(topo==='half')   return g.half_invert?(center-raw):(raw-center);
    if(topo==='solid')  return Math.abs(raw-center)-halfW;
    return halfW-Math.abs(raw-center);
  };
}

function buildSDF(recipe,shapeCtx){
  if(recipe.family==='noise')return buildNoiseSDF(recipe.json);
  if(recipe.family==='tpms') return buildTPMSSDF(recipe.json);
  if(recipe.family==='grain')return buildGrainSDF(recipe.json,shapeCtx);
  throw new Error('No evaluator for family: '+recipe.family);
}

self.onmessage=async function(e){
  const d=e.data,t0=performance.now();
  let lastStage='initializing';
  try{
    // ── Bake mode: field → N³ SDF grid, no Manifold needed ──────────────────
    if(d.mode==='bake'&&d.bakeRaw){
      const N=d.N||64;
      const wMin=d.worldMin||[-5,-5,-5],wMax=d.worldMax||[5,5,5];

// ── Grid size safety clamp ────────────────────────────────────────────────────
// Prevents WASM memory crash when cell size is tiny or resMult is large.
// Returns { safeEdge, clamped, estVoxels } — safeEdge is always >= minSafeEdge.
function clampEdgeMm(edgeMm, bbox, maxVoxels){
  const vol=(bbox.mxx-bbox.mnx)*(bbox.mxy-bbox.mny)*(bbox.mxz-bbox.mnz);
  const minSafeEdge=Math.pow(vol/maxVoxels, 1/3);
  if(!isFinite(edgeMm)||edgeMm<=0){const estVoxels=vol/Math.pow(minSafeEdge,3);return{safeEdge:minSafeEdge,clamped:true,estVoxels:Math.round(estVoxels)};}
  const safeEdge=Math.max(minSafeEdge, edgeMm);
  const clamped=safeEdge!==edgeMm;
  const estVoxels=vol/Math.pow(safeEdge,3);
  return{safeEdge,clamped,estVoxels:Math.round(estVoxels)};
}
function clampEdgeWorld(edgeWorld, maxVoxels){
  // cube mode: domain is 10x10x10 world units
  const vol=1000;
  const minSafeEdge=Math.pow(vol/maxVoxels,1/3);
  const maxSafeEdge=5.0; // >5 gives <2 voxels/side — degenerate
  if(!isFinite(edgeWorld)||edgeWorld<=0) return{safeEdge:minSafeEdge,clamped:true};
  const safeEdge=Math.min(maxSafeEdge, Math.max(minSafeEdge, edgeWorld));
  const clamped=safeEdge!==edgeWorld;
  return{safeEdge,clamped};
}
const MAX_PREVIEW_VOXELS=8e6;

// ── Live export estimate display ──────────────────────────────────────────────

      const printFloorMm=PRINT_EDGE_MM_BY_QUAL[currentExportQual]||0.10;

      edgeMm=(QUAL_EDGE_MM[currentExportQual]||.10)*10/domainMm;
    }
    const{estTris,estSec}=estimateMeshStats(currentRecipe,edgeMm,bbox,cellSizeMm);
    // Rough bake time estimate: empirically ~4µs per voxel on typical meshes;
    // scales with N³. Only shown when a re-bake would actually happen.
    let bakeSec=0;
    if(importedShape){
      const targetN=EXPORT_SHAPE_SDF_N_BY_QUAL[currentExportQual]||192;
      const cachedN=importedShape.sdfGrid?importedShape.sdfGrid.N:0;
      if(cachedN<targetN){bakeSec=Math.round(targetN*targetN*targetN*4e-6);}
    }
    const totalSec=estSec+bakeSec;
    const bakeTxt=bakeSec>0?' (includes ~'+bakeSec+'s SDF bake)':'';
    el.textContent='~'+(estTris/1e6).toFixed(1)+'M triangles · ~'+totalSec+'s'+bakeTxt;
  }catch(e){el.textContent='';}
}

function recipeIsPeriodic(recipe){
  if(!recipe) return false;
  if(recipe.family==='tpms') return true;
  if(recipe.family==='grain'){
    const ft=recipe.json.field&&recipe.json.field.type;
    return ft==='reactiondiffusion';
  }
  return false; // noise, spinodoid, GRF, HU all stochastic
}
function bakeField(recipe, N, opts){
  return new Promise((resolve,reject)=>{
    const worker=new Worker(getWorkerBlobUrl());
    const t0=performance.now();
    worker.onmessage=e=>{
      const d=e.data;
      if(d.type==='baked'){
        worker.terminate();
        resolve({data:new Float32Array(d.field),N:d.N,
          fieldMin:d.fieldMin,fieldMax:d.fieldMax,
          lipschitz:d.lipschitz,ms:Math.round(performance.now()-t0),
          worldMin:d.worldMin,worldMax:d.worldMax,isPeriodic:d.isPeriodic,topology:d.topology});
      }else if(d.type==='error'){worker.terminate();reject(new Error(d.message));}
    };
    worker.onerror=e=>{worker.terminate();reject(new Error(e.message||'Bake error'));};
    worker.postMessage({mode:'bake',recipe,N,...(opts||{})});
  });
}

function routeRecipe(json){

// ── Mesh statistics estimator ─────────────────────────────────────────────────
// Surface-area based estimate — far more accurate than voxel counting.
// Empirical formula derived from real exports: vol * K / (cellSizeMm * edgeMm²)
// where K ≈ 1.5 gives ~13% error for typical TPMS/spinodoid at Fine quality.
function estimateMeshStats(recipe, edgeMm, bbox, cellSizeMm){
  const g=recipe?.json?.geometry||{};
  const wallFrac=g.wall_thickness!=null?Math.min(1,g.wall_thickness/0.30)
                :g.half_width!=null?Math.min(1,(g.half_width*2)/0.30)
                :g.pipe_radius!=null?Math.min(1,g.pipe_radius/0.18):0.5;
  let estTris;
  if(bbox && cellSizeMm){
    // Shape mode: surface-area model
    // Triangles ≈ domainVol × wallFrac × 1.5 / (cellSizeMm × edgeMm²)
    const vol=(bbox.mxx-bbox.mnx)*(bbox.mxy-bbox.mny)*(bbox.mxz-bbox.mnz);
    estTris=Math.round(vol*wallFrac*1.5/(cellSizeMm*edgeMm*edgeMm));
  } else {
    // Cube mode: small fixed domain, simpler estimate
    const vol=1000; // 10^3 world units
    const surfFactor=Math.min(0.3, wallFrac*0.3);
    estTris=Math.round(vol/Math.pow(edgeMm,3)*surfFactor);
  }
  estTris=Math.max(1000, estTris);
  // Empirical: ~0.08ms per triangle (validated: 305k tris → ~25s)
  const estSec=Math.max(1,Math.round(estTris*0.00008));
  return{estTris,estSec};
}

    report.innerHTML='<div class="exp-report">'+
      expChip('triangles',result.triCount.toLocaleString())+
      expChip('domain',domainLabel)+
      expChip('edge',edgeLabel)+
      expChip('file',(blob.size/1024).toFixed(1)+' KB')+
      expChip('time',result.ms+'ms')+
    '</div>';
    if(elapsedEl)elapsedEl.style.display='none';
    btn.classList.remove('sweeping');btn.textContent='Export 3MF';
  }catch(e){
    if(elapsedTimer)clearInterval(elapsedTimer);
    if(elapsedEl){elapsedEl.style.display='none';}
    if(meshWorker){meshWorker.terminate();meshWorker=null;}
    hideComputing();showCancelBtn(false);
    report.innerHTML='<div class="exp-err">&#9888; '+(e.message||e)+'</div>';
    btn.classList.remove('sweeping');btn.textContent='Export 3MF';
    console.error(e);
  }
  btn.disabled=false;
};
function expChip(l,v){return`<div class="exp-chip">${l} <b>${v}</b></div>`;}

async function buildMinimal3MF(vertProps,triVerts,scale){
  const nV=vertProps.length/3,nT=triVerts.length/3;
  let vx='',tx='';
  for(let i=0;i<nV;i++)vx+=`<vertex x="${(vertProps[i*3]*scale).toFixed(6)}" y="${(vertProps[i*3+1]*scale).toFixed(6)}" z="${(vertProps[i*3+2]*scale).toFixed(6)}"/>`;
  for(let i=0;i<nT;i++)tx+=`<triangle v1="${triVerts[i*3]}" v2="${triVerts[i*3+1]}" v3="${triVerts[i*3+2]}"/>`;
  const model=`<?xml version="1.0" encoding="UTF-8"?><model unit="millimeter" xml:lang="en-US" xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02"><resources><object id="1" type="model"><mesh><vertices>${vx}</vertices><triangles>${tx}</triangles></mesh></object></resources><build><item objectid="1"/></build></model>`;
  const ct=`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml"/></Types>`;
  const rels=`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Target="/3D/3dmodel.model" Id="rel0" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel"/></Relationships>`;
  const enc=new TextEncoder();
  const zipped=fflate.zipSync({'[Content_Types].xml':enc.encode(ct),'_rels/.rels':enc.encode(rels),'3D/3dmodel.model':enc.encode(model)});
  return new Blob([zipped],{type:'model/3mf'});
}

function showError(m){errorBox.style.display='block';errorBox.textContent='⚠ '+m;}
function clearError(){errorBox.style.display='none';}
function showComputing(m,s){overlay.classList.remove('hidden');coMain.textContent=m;coSub.textContent=s||'';triPill.style.display='none';if(window._orbStart)_orbStart();}
function hideComputing(){overlay.classList.add('hidden');if(window._orbStop)_orbStop();}

function setStale(){
  const banner=document.getElementById('staleBanner');
  const btn=document.getElementById('staleRefreshBtn');
  const area=document.getElementById('previewArea');
  if(banner){banner.style.display='flex';}
  if(btn){btn.classList.add('pulsing');}
  if(area){area.classList.add('preview-stale');}
}
function clearStale(){
  const banner=document.getElementById('staleBanner');
  const btn=document.getElementById('staleRefreshBtn');
  const area=document.getElementById('previewArea');
  if(banner){banner.style.display='none';}
  if(btn){btn.classList.remove('pulsing');}
  if(area){area.classList.remove('preview-stale');}
}
function showTriCount(n,ms){triPill.style.display='block';triPill.textContent=n.toLocaleString()+' tri · '+ms+' ms';}
function setBtns(on){['btnDraft','btnLow','btnMed','btnHigh','btnUltra'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=!on;});}
function setActivBtn(id){['btnDraft','btnLow','btnMed','btnHigh','btnUltra'].forEach(b=>{const el=document.getElementById(b);if(el)el.classList.toggle('active',b===id);});}

async function showRecipe(recipe){
  clearError();currentRecipe=recipe;
  dropzone.style.display='none';recipeView.style.display='flex';
  document.getElementById('shapeStrip').style.display='block';
  typeBadge.className=recipe.family;typeBadge.textContent=FAMILY_LABEL[recipe.family]+' · '+recipe.subtype.toUpperCase();
  summaryEl.innerHTML=renderSummary(recipe);
  setActivBtn('btnDraft');triggerPreview('draft');
  setTimeout(updateExportEstimate,0); // panel renders async
}
function resetToDropzone(){
  recipeView.style.display='none';dropzone.style.display='flex';
  document.getElementById('shapeStrip').style.display='none';
  clearError();triPill.style.display='none';
  overlay.classList.remove('hidden');coMain.textContent='awaiting recipe…';coSub.textContent='';
  // clear any loaded shape on recipe reset
  if(importedShape){try{importedShape.manifold.delete();}catch(_){} importedShape=null;}
  clearShapeWire();setShapeUI('idle');
}
document.getElementById('reloadBtn').addEventListener('click',resetToDropzone);
document.getElementById('btnDraft').addEventListener('click',()=>{if(!currentRecipe)return;setActivBtn('btnDraft');triggerPreview('draft');});
document.getElementById('btnLow').addEventListener('click',()=>{if(!currentRecipe)return;setActivBtn('btnLow');triggerPreview('low');});
document.getElementById('btnMed').addEventListener('click',()=>{if(!currentRecipe)return;setActivBtn('btnMed');triggerPreview('med');});
document.getElementById('btnHigh').addEventListener('click',()=>{if(!currentRecipe)return;setActivBtn('btnHigh');triggerPreview('high');});
document.getElementById('btnUltra').addEventListener('click',()=>{if(!currentRecipe)return;setActivBtn('btnUltra');triggerPreview('ultra');});




// ── URL ingestion — auto-load recipe from ?r= parameter ──────────────────
(function(){
  try{
    const p=new URLSearchParams(location.search);
    if(p.has('r')){
      const json=JSON.parse(decodeURIComponent(p.get('r')));
      // Wait for DOM + Manifold to be ready, then show
      setTimeout(()=>showRecipe(routeRecipe(json)),0);
    }
  }catch(e){
    console.warn('URL recipe parse error:',e);
  }
})();

// ── File handling ─────────────────────────────────────────────────────────
function handleJSON(text,filename){let json;try{json=JSON.parse(text);}catch(e){showError('Invalid JSON in '+(filename||'file')+' — '+e.message);return;}try{showRecipe(routeRecipe(json));}catch(e){showError(e.message);}}
function handleFile(file){if(!file)return;if(!file.name.toLowerCase().endsWith('.json')){showError('Expected a .json file. Got: '+file.name);return;}const reader=new FileReader();reader.onload=e=>handleJSON(e.target.result,file.name);reader.onerror=()=>showError('Could not read: '+file.name);reader.readAsText(file);}
const fileInput=document.getElementById('fileInput'),pickBtn=document.getElementById('pickBtn');
dropzone.addEventListener('click',()=>fileInput.click());
pickBtn.addEventListener('click',e=>{e.stopPropagation();fileInput.click();});
fileInput.addEventListener('change',()=>{if(fileInput.files[0])handleFile(fileInput.files[0]);fileInput.value='';});
document.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('dragover');});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget)dropzone.classList.remove('dragover');});
document.addEventListener('drop',e=>{e.preventDefault();dropzone.classList.remove('dragover');const f=e.dataTransfer?.files?.[0];if(f)handleFile(f);});

// ── Shape strip events ────────────────────────────────────────────────────
const shapeDZ=document.getElementById('shapeDZ');
const shapeInput=document.getElementById('shapeInput');
const SHAPE_EXTS=new Set(['stl','obj','3mf','step','stp','iges','igs']);
function isShapeFile(f){return f&&SHAPE_EXTS.has(f.name.split('.').pop().toLowerCase());}
shapeDZ.addEventListener('click',()=>shapeInput.click());
shapeInput.addEventListener('change',()=>{if(shapeInput.files[0])handleShapeFile(shapeInput.files[0]);shapeInput.value='';});
shapeDZ.addEventListener('dragover',e=>{e.stopPropagation();e.preventDefault();shapeDZ.classList.add('dragover');});
shapeDZ.addEventListener('dragleave',e=>{shapeDZ.classList.remove('dragover');});
shapeDZ.addEventListener('drop',e=>{e.stopPropagation();e.preventDefault();shapeDZ.classList.remove('dragover');const f=e.dataTransfer?.files?.[0];if(f&&isShapeFile(f))handleShapeFile(f);});

// ── Cell size stale detection (event delegation — input is dynamically rendered) ──
document.addEventListener('input',e=>{if(e.target&&e.target.id==='shapeCellSizeMm'&&importedShape&&!recipeIsPeriodic(currentRecipe)){setStale();}});
</script>
